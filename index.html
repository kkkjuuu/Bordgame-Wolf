<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Werewolf Pro by.lilyuux</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #0f0c29; --wolf: #e74c3c; --seer: #3498db; --gold: #c5a059; --guard: #27ae60; }
        body { font-family: 'Kanit', sans-serif; margin: 0; background: var(--bg); color: white; text-align: center; }
        .container { background: #16213e; padding: 20px; border-radius: 20px; width: 90%; max-width: 400px; margin: 20px auto; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .credit { font-size: 12px; color: #888; margin-top: 15px; }
        input, select, button { width: 100%; padding: 12px; margin: 8px 0; border-radius: 8px; border: none; font-size: 16px; font-family: 'Kanit'; box-sizing: border-box; }
        button { background: var(--wolf); color: white; cursor: pointer; font-weight: bold; transition: 0.3s; }
        button:hover { filter: brightness(1.1); }
        button:disabled { background: #555 !important; cursor: not-allowed; }
        .btn-blue { background: var(--seer); }
        .btn-green { background: var(--guard); }
        .room-card { background: rgba(255,255,255,0.1); padding: 10px; margin: 10px 0; border-radius: 10px; display: flex; justify-content: space-between; align-items: center; text-align: left; }
        .player-item { background: rgba(255,255,255,0.1); padding: 10px; margin: 5px 0; border-radius: 8px; display: flex; justify-content: space-between; align-items: center;}
        .hidden { display: none !important; }
        .card-reveal { width: 220px; height: 320px; margin: 15px auto; perspective: 1000px; }
        .card-inner { position: relative; width: 100%; height: 100%; transition: transform 0.6s; transform-style: preserve-3d; cursor: pointer; }
        .card-inner.flipped { transform: rotateY(180deg); }
        .card-front, .card-back { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; border: 3px solid var(--gold); border-radius: 15px; }
        .card-front { background: #2c3e50; display: flex; align-items: center; justify-content: center; font-size: 50px; }
        .card-back { transform: rotateY(180deg); background-size: cover; background-position: center; }
        .notice-box { background: rgba(255,255,255,0.1); padding: 10px; border-radius: 10px; margin-bottom: 10px; color: #f1c40f; }
        .timer-text { font-size: 40px; color: #e74c3c; font-weight: bold; margin: 10px 0; }
        
        /* สไตล์โปรไฟล์ */
        .profile-box { background: rgba(255,255,255,0.05); padding: 15px; border-radius: 10px; margin-bottom: 15px; position: relative; }
        .profile-img { width: 90px; height: 90px; border-radius: 50%; border: 3px solid var(--gold); object-fit: cover; background: #2c3e50; }
        
        /* หน้าต่างเลือกรูป */
        .avatar-grid { display: flex; flex-wrap: wrap; gap: 15px; justify-content: center; margin: 20px 0; }
        .avatar-option { width: 80px; height: 80px; border-radius: 50%; border: 3px solid transparent; cursor: pointer; object-fit: cover; transition: 0.3s; background: #2c3e50; }
        .avatar-option:hover { transform: scale(1.1); border-color: var(--seer); }
        .avatar-option.selected { border-color: var(--gold); box-shadow: 0 0 15px var(--gold); transform: scale(1.1); }

        /* 👑 ตกแต่ง UI แบบโต๊ะใหม่ 🐺 */
        #game-table-screen { width: 95%; max-width: 600px; display: grid; grid-template-rows: auto 1fr auto; gap: 15px; }
        #table-container { background: #000; border-radius: 20px; padding: 20px; display: grid; grid-template-columns: repeat(3, 1fr); grid-template-rows: repeat(3, 1fr); gap: 10px; position: relative; }
        .table-central-rect { grid-column: 2 / 3; grid-row: 2 / 3; background: rgba(255,255,255,0.2); border-radius: 10px; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 10px; color: #f1c40f; font-size: 14px; text-align: center; }
        .player-spot { position: relative; width: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; border-radius: 10px; background: rgba(255,255,255,0.05); cursor: default; }
        .player-avatar-spot { width: 80px; height: 80px; border-radius: 20px; object-fit: cover; border: 3px solid transparent; background: #2c3e50; transition: 0.2s; position: relative; }
        .player-spot.targetable { cursor: pointer; background: rgba(var(--seer), 0.2); }
        .player-spot.targetable:hover { transform: scale(1.05); }
        .player-name { margin-top: 5px; font-size: 14px; width: 100%; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; text-align: center; }
        .player-ready { font-size: 12px; color: #aaa; margin-top: 2px; }
        
        /* สไตล์ไอคอนซ้อนเมื่อตาย/ป้องกัน */
        .overlay-skull, .overlay-shield { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border-radius: 20px; background-size: contain; background-repeat: no-repeat; background-position: center; z-index: 5; }

    </style>
</head>
<body>

<div id="lobby" class="container">
    <h1>🐺 Werewolf Online</h1>
    
    <div class="profile-box">
        <img src="" alt="Profile" class="profile-img" id="playerAvatar">
        <br>
        <button onclick="openAvatarSelect()" class="btn-blue" style="width: auto; padding: 5px 15px; font-size: 14px; margin-top: -15px; border-radius: 20px; position: relative; z-index: 2;">✏️ เปลี่ยนรูป</button>
        
        <input type="text" id="playerNameInput" placeholder="ตั้งชื่อของคุณ..." maxlength="15" style="text-align: center; margin-top: 10px;">
        <button onclick="saveProfile()" class="btn-green" style="margin-top: 5px; padding: 8px;">💾 บันทึกโปรไฟล์</button>
        <p id="saveMessage" class="hidden" style="color: var(--guard); font-size: 14px; margin-top: 5px; font-weight: bold;">บันทึกสำเร็จ!</p>
    </div>

    <button onclick="showScreen('create-screen'); unlockVoice();">สร้างห้อง</button>
    <button class="btn-blue" onclick="joinManual()">เข้าร่วมด้วยรหัสห้อง</button>
    <hr style="opacity: 0.3; margin: 15px 0;">
    <div id="room-list">กำลังค้นหาห้อง...</div>
    <div class="credit">Card Game Creators by.lilyuux</div>
</div>

<div id="avatar-screen" class="container hidden">
    <h2>เลือกรูปโปรไฟล์ของคุณ</h2>
    <div id="avatar-grid" class="avatar-grid"></div>
    <button style="background:#555" onclick="showScreen('lobby')">ย้อนกลับ</button>
</div>

<div id="create-screen" class="container hidden">
    <h2>สร้างห้องใหม่</h2>
    <input type="text" id="hName" placeholder="ชื่อเล่นของคุณ">
    <input type="text" id="rName" placeholder="ชื่อห้อง">
    <input type="password" id="rPass" placeholder="รหัสผ่าน (ถ้ามี)">
    <select id="maxP"><option value="4">4 คน</option><option value="5">5 คน</option><option value="6">6 คน</option></select>
    <button onclick="createRoom()">ตกลงสร้างห้อง</button>
    <button style="background:#555" onclick="showScreen('lobby')">ย้อนกลับ</button>
</div>

<div id="waiting-room" class="container hidden">
    <h2 id="room-title"></h2>
    <div id="player-list"></div>
    <div id="host-controls" class="hidden" style="margin-top: 15px;">
        <button id="start-btn" onclick="startGame()" disabled>เริ่มเกม</button>
    </div>
    <div class="credit">Card Game Creators by.lilyuux</div>
</div>

<div id="game-table-screen" class="container hidden">
    <div id="table-container">
        <div id="player-spots"></div>
        
        <div class="table-central-rect">
            <h3 style="margin:0 0 5px 0; font-size:18px;">🌙 กลางคืน</h3>
            <p id="status-text" style="margin:0; font-size: 12px;"></p>
            <p id="timer-text" class="hidden" style="margin-top: 5px; font-size: 18px; color:var(--wolf); font-weight:bold;">15</p>
        }
    </div>
    
    <div id="table-controls" class="hidden"></div>
    
    <div id="end-screen" class="hidden container">
        <h1 id="win-title" style="font-size: 40px; margin-bottom: 5px;"></h1>
        <div id="end-roles" style="text-align: left; background: rgba(0,0,0,0.3); padding: 15px; border-radius: 10px; margin-bottom: 20px;"></div>
        <button id="play-again-btn" class="btn-green" onclick="playAgain()">เล่นต่อ (Play Again)</button>
        <button style="background:#555; margin-top:10px;" onclick="location.reload()">ออกไปหน้าแรก</button>
    </div>
</div>

<div id="game-screen" class="container hidden">
    <div id="role-area">
        <h3>บทบาทของคุณ (แตะที่การ์ด)</h3>
        <div class="card-reveal">
            <div class="card-inner" id="card-obj" onclick="this.classList.toggle('flipped')">
                <div class="card-front">?</div>
                <div id="role-img" class="card-back"></div>
            </div>
        </div>
        <p id="role-text" style="font-weight:bold; font-size: 22px; margin: 10px 0;"></p>
        <button id="ready-btn" class="btn-blue" onclick="playerReady()">พร้อมแล้ว</button>
    </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
    const socket = io();
    let myRoom = '', myRole = '', isHost = false, lastGuard = '';
    let totalAlive = 0, currentGameState = '', skillTarget = null;

    const ROLE_IMG = {
        "มนุษย์หมาป่า": "https://i.postimg.cc/cH4TvQcd/IMG-0044.jpg",
        "ผู้หยั่งรู้": "https://i.postimg.cc/G2hz4kjr/IMG-0042.jpg",
        "บอดี้การ์ด": "https://i.postimg.cc/pTXkmDB2/IMG-0043.jpg",
        "ชาวบ้าน": "https://i.postimg.cc/pdBqV0KX/IMG-0041.jpg"
    };
    
    const ICON_IMG = {
        " skull": "https://i.postimg.cc/XJWz04gS/IMG-0065.png",
        " shield": "https://i.postimg.cc/0NDB3bDF/IMG-0064.png"
    };

    const AVATARS = [
        "https://i.postimg.cc/SRwj1TW2/Untitled-design.png",
        "https://i.postimg.cc/dQX701zP/Untitled-design.png",
        "https://i.postimg.cc/2jJq56Pz/Untitled-design.png",
        "https://i.postimg.cc/mZqcrD0L/Untitled-design.png",
        "https://i.postimg.cc/CMtZK1WM/Untitled-design.png",
        "https://i.postimg.cc/0536NQLb/Untitled-design.png",
        "https://i.postimg.cc/RC830FjK/Untitled-design.png"
    ];
    let currentAvatar = AVATARS[0];

    function openAvatarSelect() {
        showScreen('avatar-screen');
        const grid = document.getElementById('avatar-grid');
        grid.innerHTML = AVATARS.map(url => `
            <img src="${url}" class="avatar-option ${url === currentAvatar ? 'selected' : ''}" onclick="selectAvatar('${url}')">
        `).join('');
    }

    function selectAvatar(url) {
        currentAvatar = url;
        document.getElementById('playerAvatar').src = currentAvatar;
        localStorage.setItem('boardgame_playerAvatar', currentAvatar);
        showScreen('lobby');
    }

    function generateWolfName() {
        const randomNum = Math.floor(Math.random() * 999) + 1;
        return `wolf#${randomNum.toString().padStart(3, '0')}`;
    }

    function loadProfile() {
        let savedName = localStorage.getItem('boardgame_playerName');
        if (!savedName) { savedName = generateWolfName(); localStorage.setItem('boardgame_playerName', savedName); }
        document.getElementById('playerNameInput').value = savedName; document.getElementById('hName').value = savedName; 

        let savedAvatar = localStorage.getItem('boardgame_playerAvatar');
        if (!savedAvatar || !AVATARS.includes(savedAvatar)) { savedAvatar = AVATARS[0]; }
        currentAvatar = savedAvatar; document.getElementById('playerAvatar').src = currentAvatar;
    }

    function saveProfile() {
        const nameInput = document.getElementById('playerNameInput');
        let newName = nameInput.value.trim();
        if (newName === "") { newName = generateWolfName(); nameInput.value = newName; }
        localStorage.setItem('boardgame_playerName', newName); document.getElementById('hName').value = newName;
        const msg = document.getElementById('saveMessage'); msg.classList.remove('hidden'); setTimeout(() => msg.classList.add('hidden'), 2000);
    }

    window.onload = () => { loadProfile(); };

    function unlockVoice() { if('speechSynthesis' in window) { window.speechSynthesis.speak(new SpeechSynthesisUtterance("")); } }
    function speakGame(text) {
        if (isHost && 'speechSynthesis' in window) {
            const msg = new SpeechSynthesisUtterance(text); msg.lang = 'th-TH'; msg.rate = 0.95; window.speechSynthesis.speak(msg);
        }
    }

    function showScreen(id) {
        document.querySelectorAll('.container').forEach(el => el.classList.add('hidden'));
        document.getElementById(id).classList.remove('hidden');
    }

    function createRoom() {
        let n = document.getElementById('hName').value.trim();
        if(!n) { n = generateWolfName(); document.getElementById('hName').value = n; }
        localStorage.setItem('boardgame_playerName', n); document.getElementById('playerNameInput').value = n;
        const r = document.getElementById('rName').value, p = document.getElementById('rPass').value, m = document.getElementById('maxP').value;
        if(n && r) socket.emit('createRoom', { roomId: r, playerName: n, maxPlayers: m, password: p });
    }

    function joinManual() { unlockVoice(); const rid = prompt("ใส่ชื่อห้อง:"); if(rid) joinRoomPrompt(rid, false); }
    function joinRoomPrompt(rid, hasP) { 
        unlockVoice(); let currentName = localStorage.getItem('boardgame_playerName') || generateWolfName(); const n = prompt("ชื่อเล่นของคุณ:", currentName); 
        if(!n) return; localStorage.setItem('boardgame_playerName', n); document.getElementById('playerNameInput').value = n;
        socket.emit('joinRoom', { roomId: rid, playerName: n, password: (hasP?prompt("รหัสผ่าน:"): "") }); 
    }

    function generateTableSpots(maxPlayers) {
        const spots = document.getElementById('player-spots');
        spots.innerHTML = ''; // ล้างค่าเก่า
        spots.classList.remove('spots-4', 'spots-5', 'spots-6'); // ล้างคลาสเก่า

        const layouts = {
            "4": [ [0,0], [0,2], [2,0], [2,2] ],
            "6": [ [0,0], [0,1], [0,2], [2,0], [2,1], [2,2] ],
            "5": [ [0,0], [0,2], [1,1], [2,0], [2,2] ]
        };

        const gridPos = layouts[maxPlayers] || layouts["4"]; // ใช้ 4 เป็น default หากผิดพลาด

        // เพิ่มคลาสสำหรับเลย์เอาต์พิเศษ
        if (maxPlayers === '4') spots.classList.add('spots-4');
        else if (maxPlayers === '6') spots.classList.add('spots-6');
        else if (maxPlayers === '5') spots.classList.add('spots-5');

        for (let i = 0; i < gridPos.length; i++) {
            const spotId = `spot-${i}`;
            spots.innerHTML += `
                <div class="player-spot" id="${spotId}" onclick="handlePlayerClick('${spotId}')" style="grid-column:${gridPos[i][1]+1}; grid-row:${gridPos[i][0]+1};">
                    <img src="" class="player-avatar-spot" id="${spotId}-avatar">
                    <div id="${spotId}-skull" class="overlay-skull hidden" style="background-image:url('${ICON_IMG[' skull']}')"></div>
                    <div id="${spotId}-shield" class="overlay-shield hidden" style="background-image:url('${ICON_IMG[' shield']}')"></div>
                    <div class="player-name" id="${spotId}-name">?</div>
                    <div class="player-ready" id="${spotId}-ready">⏳ รอ</div>
                </div>
            `;
        }
    }

    function renderPlayersOnTable(room) {
        generateTableSpots(room.maxPlayers.toString());
        for (let i = 0; i < room.players.length; i++) {
            const p = room.players[i], spotId = `spot-${i}`;
            const avatar = document.getElementById(`${spotId}-avatar`); if(avatar) avatar.src = p.avatarUrl || AVATARS[i % AVATARS.length]; // ใส่รูปที่สุ่มให้ถ้ายังไม่มีระบบบันทึกรูป ID
            const name = document.getElementById(`${spotId}-name`); if(name) name.innerText = p.name + (p.isHost?'👑':'');
            const ready = document.getElementById(`${spotId}-ready`); if(ready) ready.innerText = p.isReady?'✅':'⏳';
            
            // ซ่อน/แสดง กะโหลกเมื่อตาย
            const skull = document.getElementById(`${spotId}-skull`);
            if(skull && !p.isAlive) skull.classList.remove('hidden');
            
            // ซ่อน/แสดง โล่เมื่อได้รับความคุ้มครอง
            const shield = document.getElementById(`${spotId}-shield`);
            if(shield && p.isAlive && currentGameState === 'DAY_TIME' && room.shieldTarget === p.id) {
                shield.classList.remove('hidden');
            } else if(shield) {
                shield.classList.add('hidden');
            }

            // จัดการคลาส targetable สำหรับสกิล
            const spot = document.getElementById(spotId);
            if(spot && room.state.includes('NIGHT') && p.isAlive && p.id !== socket.id) {
                // ตัวอย่าง: หมาป่าเลือกฆ่า (เว้นตัวเอง), ผู้หยั่งรู้เลือกตรวจสอบ (เว้นตัวเอง)
                const me = room.players.find(x => x.id === socket.id);
                if(me.role === 'มนุษย์หมาป่า' && room.state === 'NIGHT_WOLF') spot.classList.add('targetable');
                else if(me.role === 'ผู้หยั่งรู้' && room.state === 'NIGHT_SEER') spot.classList.add('targetable');
                else if(me.role === 'บอดี้การ์ด' && room.state === 'NIGHT_BODYGUARD' && p.id !== lastGuard) spot.classList.add('targetable');
                else spot.classList.remove('targetable');
            } else if(spot) {
                spot.classList.remove('targetable');
            }
        }
    }
    
    function handlePlayerClick(spotId) {
        const spot = document.getElementById(spotId);
        if(!spot.classList.contains('targetable')) return;
        
        // ลบไฮไลท์เก่า
        document.querySelectorAll('.player-avatar-spot').forEach(el => el.style.borderColor = 'transparent');
        // เพิ่มไฮไลท์ที่รูปใหม่
        document.getElementById(`${spotId}-avatar`).style.borderColor = ROLE_IMG[myRole]? (ROLE_IMG[myRole].includes('wolf')?'var(--wolf)':'var(--seer)'):'transparent';
        
        const targetSpotIndex = parseInt(spotId.replace('spot-', ''));
        socket.emit('skillTargetSelected', targetSpotIndex); // ส่ง ID ลำดับที่เลือกกลับไปให้เซิร์ฟเวอร์
    }

    // --- ส่วนของ Socket.IO ที่เหลือเหมือนเดิมทั้งหมด (แต่ปรับ updateRoom เพื่อเรียกใช้ระบบโต๊ะ) ---
    socket.on('roomListUpdate', (rooms) => {
        const list = document.getElementById('room-list');
        list.innerHTML = rooms.length === 0 ? '<p style="color:#888;">ยังไม่มีใครสร้างห้อง</p>' : rooms.map(r => `
            <div class="room-card">
                <div><b>${r.id}</b> ${r.hasPassword?'🔒':''}<br><small>คนในห้อง: ${r.currentPlayers}/${r.maxPlayers}</small></div>
                <button style="width:auto; padding:5px 15px;" class="btn-blue" onclick="joinRoomPrompt('${r.id}', ${r.hasPassword})">เข้า</button>
            </div>`).join('');
    });

    socket.on('joined', (d) => { 
        myRoom = d.roomId; isHost = d.isHost; 
        showScreen('waiting-room'); 
        document.getElementById('room-title').innerText = "ห้อง: " + myRoom; 
        if(isHost) document.getElementById('host-controls').classList.remove('hidden'); 
    });

    socket.on('updateRoom', (room) => {
        const pList = document.getElementById('player-list');
        if(pList) pList.innerHTML = room.players.map(p => `
            <div class="player-item">
                <span>${p.name} ${p.isHost?'👑':''}</span>
                <span>${p.isReady?'✅ พร้อม':'⏳ รอ'}</span>
            </div>`).join('');
        
        if(isHost && room.state === 'LOBBY') {
            const btn = document.getElementById('start-btn');
            btn.disabled = room.players.length < 4;
            btn.innerText = room.players.length < 4 ? `ขาดอีก ${4-room.players.length} คน` : "เริ่มเกม";
        }

        if (room.state !== currentGameState) {
            currentGameState = room.state;
            if (room.state === 'NIGHT_WOLF') speakGame("เข้าสู่กลางคืน มนุษย์หมาป่าลืมตา");
            else if (room.state === 'NIGHT_SEER') speakGame("มนุษย์หมาป่าหลับตา ผู้หยั่งรู้ลืมตา");
            else if (room.state === 'NIGHT_BODYGUARD') speakGame("ผู้หยั่งรู้หลับตา บอดี้การ์ดลืมตา");
            else if (room.state === 'DAY_TIME') speakGame("ทุกคนลืมตา เช้าแล้ว");
            else if (room.state === 'VOTING') speakGame("หมดเวลาพูดคุย เริ่มทำการโหวตได้");
            else if (room.state === 'GAME_OVER') speakGame("เกมจบแล้ว " + room.winner);
        }

        if(room.state === 'STARTING') {
            lastGuard = '';
            document.getElementById('seer-notice').classList.add('hidden');
        }

        if(room.state === 'ROLE_REVEAL') {
            const me = room.players.find(p => p.id === socket.id);
            if(me) {
                myRole = me.role;
                showScreen('game-screen');
                document.getElementById('role-area').classList.remove('hidden');
                document.getElementById('action-area').classList.add('hidden');
                document.getElementById('end-screen').classList.add('hidden');
                
                document.getElementById('role-text').innerText = "คุณคือ: " + myRole;
                document.getElementById('role-img').style.backgroundImage = "url('" + ROLE_IMG[myRole] + "')";
                document.getElementById('ready-btn').disabled = false;
                document.getElementById('ready-btn').innerText = "พร้อมเข้าสู่กลางคืน";
            }
        }

        if(room.state.includes('NIGHT')) {
            showScreen('game-table-screen');
            document.getElementById('table-central-rect').classList.remove('hidden');
            document.getElementById('table-central-rect').style.gridColumn = room.maxPlayers === '5'?'1/4':'2/3'; // ปรับตำแหน่งตรงกลางสำหรับ 5 คน
            const statusText = document.getElementById('status-text');
            const timerText = document.getElementById('timer-text');
            timerText.classList.add('hidden'); // ซ่อนเวลาในคืนแรก

            const me = room.players.find(p => p.id === socket.id);
            if(!me.isAlive) { statusText.innerText = "คุณตายแล้ว เฝ้าดูวิญญาณ..."; return; }
            
            if(room.state === 'NIGHT_WOLF' && myRole === 'มนุษย์หมาป่า') { statusText.innerText = "มนุษย์หมาป่าลืมตา: กดเลือกเป้าหมายที่รูปผู้เล่น!"; }
            else if(room.state === 'NIGHT_SEER' && myRole === 'ผู้หยั่งรู้') { statusText.innerText = "ผู้หยั่งรู้ลืมตา: กดเลือกเป้าหมายที่รูปผู้เล่น!"; }
            else if(room.state === 'NIGHT_BODYGUARD' && myRole === 'บอดี้การ์ด') { statusText.innerText = "บอดี้การ์ดลืมตา: กดเลือกเป้าหมายที่รูปผู้เล่น!"; }
            else { statusText.innerText = "🌙 นอนหลับ... รอวิญญาณคนอื่นดำเนินการ"; }
            
            renderPlayersOnTable(room);
        }

        if(room.state === 'DAY_TIME') {
            document.getElementById('seer-notice').classList.add('hidden'); 
            showScreen('game-table-screen');
            const statusText = document.getElementById('status-text');
            const me = room.players.find(p => p.id === socket.id);
            
            let status = room.lastVictim ? `<p style="color:red; font-size:18px;">เมื่อคืน ${room.lastVictim} ถูกฆ่าตาย</p>` : "<p style='font-size:18px;'>ไม่มีใครตาย</p>";
            if(me && me.isAlive) { status += "<p>เมื่อคุยกันจบแล้ว กดปุ่มด้านล่างเพื่อ 'เริ่มโหวต'</p>"; } 
            else { status += "<p style='color:#aaa'>คุณตายแล้ว รอเพื่อนคนเป็นโหวต...</p>"; }
            statusText.innerHTML = status;
            
            renderPlayersOnTable(room);
            
            const controls = document.getElementById('table-controls');
            if(me && me.isAlive) {
                controls.classList.remove('hidden');
                controls.innerHTML = `<button onclick="socket.emit('startVoting', myRoom)">เริ่มทำการโหวต</button>`;
            } else { controls.classList.add('hidden'); }
        }

        if(room.state === 'VOTING') {
            showScreen('game-table-screen');
            const statusText = document.getElementById('status-text');
            const timerText = document.getElementById('timer-text');
            const me = room.players.find(p => p.id === socket.id);
            totalAlive = room.players.filter(p => p.isAlive).length;
            
            statusText.innerText = `⚖️ ช่วงโหวต! กดที่รูปผู้เล่นเพื่อโหวต (0 / ${totalAlive} คน)`;
            timerText.classList.remove('hidden'); // แสดงเวลาโหวต
            
            const spot = document.getElementById(`spot-${targetSpotIndex}`); // ไม่แน่ใจว่า targetSpotIndex คืออะไร?
            spot.onclick = () => { socket.emit('castVote', { roomId: myRoom, targetId: p.id }); disableAllVotes(); }; // ผิดที่ตรงนี้ p.id ต้องหาจาก index?
            
            // ไม่ต้อง renderTargetButtons อีกแล้ว แต่ต้องจัดการการกดบนโต๊ะ
            //renderPlayersOnTable(room); // ต้องแน่ใจว่า handlePlayerClick จัดการ castVote ด้วย
        }

        if(room.state === 'DAY_RESULT') {
            showScreen('game-table-screen');
            const statusText = document.getElementById('status-text');
            if (room.lastEliminated) statusText.innerHTML = `<p style="color:red; font-size:20px; font-weight:bold;">มติเอกฉันท์: ${room.lastEliminated} ถูกโหวตออก!</p>`;
            else statusText.innerHTML = `<p style="font-size:20px; font-weight:bold;">คะแนนไม่เอกฉันท์ (ไม่มีใครถูกโหวตออก)</p>`;
        }

        if(room.state === 'GAME_OVER') {
            document.getElementById('table-controls').classList.add('hidden');
            document.getElementById('end-screen').classList.remove('hidden');
            
            const title = document.getElementById('win-title');
            title.innerText = room.winner;
            title.style.color = room.winner.includes('หมาป่า') ? 'var(--wolf)' : 'var(--seer)';
            
            document.getElementById('end-roles').innerHTML = room.players.map(p => 
                `<p style="margin:5px 0;"><b>${p.name}:</b> ${p.role} ${p.isAlive ? '' : '💀'} <span style="color:#2ecc71; font-size:12px;">${p.wantsToPlayAgain ? '✅ เล่นต่อ' : ''}</span></p>`
            ).join('');

            const me = room.players.find(p => p.id === socket.id);
            const paBtn = document.getElementById('play-again-btn');
            if (me && me.wantsToPlayAgain) {
                paBtn.disabled = true; paBtn.innerText = "รอเพื่อนกดเล่นต่อ...";
            } else { paBtn.disabled = false; paBtn.innerText = "เล่นต่อ (Play Again)"; }
        }
    });

    socket.on('voteCountUpdate', (count) => {
        const vc = document.getElementById('status-text');
        if(vc && currentGameState === 'VOTING') {
            vc.innerText = `⚖️ ช่วงโหวต! กดที่รูปผู้เล่นเพื่อโหวต (${count} / ${totalAlive} คน)`;
        }
    });

    socket.on('timerUpdate', (time) => {
        const timer = document.getElementById('timer-text');
        if(timer) timer.innerText = time;
    });

    socket.on('seerResult', (d) => { alert(`ผลการตรวจ: ${d.name} คือ ${d.result}`); });

    function playerReady() { 
        socket.emit('playerReady', myRoom); document.getElementById('ready-btn').disabled = true; document.getElementById('ready-btn').innerText = "รอคนอื่นกดพร้อม..."; 
    }

    function playAgain() { socket.emit('playAgain', myRoom); }
    function startGame() { socket.emit('startGame', myRoom); }
    socket.on('errorMsg', (m) => alert(m));
</script>
</body>
</html>
