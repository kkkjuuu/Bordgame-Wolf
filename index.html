<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Werewolf Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        /* ... CSS เดิม ... */
        .room-card {
            background: rgba(255,255,255,0.1); padding: 15px; margin: 10px 0;
            border-radius: 10px; display: flex; justify-content: space-between; align-items: center;
        }
        .lock-icon { margin-left: 5px; color: #f1c40f; }
        .badge { background: #e94560; padding: 2px 8px; border-radius: 5px; font-size: 12px; }
    </style>
</head>
<body>

    <div id="lobby" class="container">
        <h1>🐺 Werewolf Online</h1>
        
        <div id="main-menu">
            <button class="btn btn-main" onclick="showScreen('create-screen')">สร้างห้องใหม่</button>
            <hr>
            <h3>ห้องที่เปิดอยู่</h3>
            <div id="room-list">
                <p style="color: #888;">กำลังค้นหาห้อง...</p>
            </div>
        </div>

        <div id="create-screen" style="display:none;">
            <input type="text" id="hostName" placeholder="ชื่อของคุณ">
            <input type="text" id="roomCodeC" placeholder="ชื่อห้อง">
            <input type="password" id="roomPassC" placeholder="รหัสผ่าน (ถ้ามี)">
            <label>จำนวนผู้เล่น:</label>
            <input type="number" id="maxP" value="4" min="4" max="6">
            <button class="btn btn-main" onclick="createRoom()">ยืนยันสร้างห้อง</button>
            <button class="btn" onclick="location.reload()">ย้อนกลับ</button>
        </div>
    </div>

    <div id="waiting-room" class="container" style="display:none;">
        <h2 id="room-title"></h2>
        <div id="player-list"></div>
        <div id="host-controls" style="display:none; margin-top:20px;">
            <p id="wait-msg">รอเพื่อนครบ...</p>
            <button id="start-btn" class="btn btn-main" onclick="startGame()" disabled>เริ่มเกม (ต้องมี 4 คนขึ้นไป)</button>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        let myRoom = '';
        let isHost = false;

        // รับรายการห้องจาก Server
        socket.on('roomListUpdate', (rooms) => {
            const list = document.getElementById('room-list');
            if(rooms.length === 0) {
                list.innerHTML = '<p>ยังไม่มีใครสร้างห้อง</p>';
                return;
            }
            list.innerHTML = rooms.map(r => `
                <div class="room-card">
                    <div>
                        <b>${r.id}</b> ${r.hasPassword ? '<span class="lock-icon">🔒</span>' : ''}<br>
                        <small>ผู้เล่น: ${r.currentPlayers}/${r.maxPlayers}</small>
                    </div>
                    <button class="btn btn-blue" style="width:auto; padding:5px 15px;" 
                        onclick="askJoin('${r.id}', ${r.hasPassword})">เข้าร่วม</button>
                </div>
            `).join('');
        });

        function createRoom() {
            const name = document.getElementById('hostName').value;
            const code = document.getElementById('roomCodeC').value;
            const pass = document.getElementById('roomPassC').value;
            const max = document.getElementById('maxP').value;
            if(!name || !code) return alert('กรอกข้อมูลไม่ครบ');
            socket.emit('createRoom', { roomId: code, playerName: name, maxPlayers: max, password: pass });
        }

        function askJoin(roomId, hasPass) {
            const name = prompt("กรุณาใส่ชื่อของคุณ:");
            if(!name) return;
            let pass = "";
            if(hasPass) {
                pass = prompt("ห้องนี้มีรหัสผ่าน:");
                if(!pass) return;
            }
            myRoom = roomId;
            socket.emit('joinRoom', { roomId, playerName: name, password: pass });
        }

        socket.on('joined', (data) => {
            myRoom = data.roomId;
            isHost = data.isHost;
            document.getElementById('lobby').style.display = 'none';
            document.getElementById('waiting-room').style.display = 'block';
            document.getElementById('room-title').innerText = "ห้อง: " + myRoom;
            if(isHost) document.getElementById('host-controls').style.display = 'block';
        });

        socket.on('updateRoom', (room) => {
            // อัปเดตรายชื่อผู้เล่น
            const list = document.getElementById('player-list');
            list.innerHTML = room.players.map(p => `
                <div class="player-item">
                    ${p.name} ${p.isHost ? '<span class="badge">HOST</span>' : ''}
                </div>
            `).join('');

            // แก้บัคเริ่มเกม: ถ้าครบจำนวนที่ตั้งไว้ และเป็น Host ให้กดเริ่มได้
            if(isHost) {
                const btn = document.getElementById('start-btn');
                if(room.players.length >= 4) {
                    btn.disabled = false;
                    document.getElementById('wait-msg').innerText = "ผู้เล่นพร้อมแล้ว!";
                } else {
                    btn.disabled = true;
                    document.getElementById('wait-msg').innerText = `ขาดอีก ${room.maxPlayers - room.players.length} คน...`;
                }
            }
            
            // ... (Logic การเปลี่ยนสถานะ STARTING / ROLE_REVEAL เหมือนเดิม) ...
        });

        function startGame() {
            socket.emit('startGame', myRoom);
        }

        function showScreen(id) {
            document.getElementById('main-menu').style.display = 'none';
            document.getElementById(id).style.display = 'block';
        }

        socket.on('errorMsg', (m) => alert(m));
    </script>
</body>
</html>
