<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Werewolf Pro by.lilyuux</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #0f0c29; --wolf: #e74c3c; --seer: #3498db; --gold: #c5a059; --guard: #27ae60; }
        body { font-family: 'Kanit', sans-serif; margin: 0; background: var(--bg); color: white; text-align: center; }
        .container { background: #16213e; padding: 20px; border-radius: 20px; width: 90%; max-width: 400px; margin: 20px auto; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .credit { font-size: 12px; color: #888; margin-top: 15px; }
        input, select, button { width: 100%; padding: 12px; margin: 8px 0; border-radius: 8px; border: none; font-size: 16px; font-family: 'Kanit'; box-sizing: border-box; }
        button { background: var(--wolf); color: white; cursor: pointer; font-weight: bold; }
        button:disabled { background: #555 !important; cursor: not-allowed; }
        .btn-blue { background: var(--seer); }
        .room-card { background: rgba(255,255,255,0.1); padding: 10px; margin: 10px 0; border-radius: 10px; display: flex; justify-content: space-between; align-items: center; text-align: left; }
        .player-item { background: rgba(255,255,255,0.1); padding: 10px; margin: 5px 0; border-radius: 8px; display: flex; justify-content: space-between; }
        .hidden { display: none !important; }
        .card-reveal { width: 220px; height: 320px; margin: 15px auto; perspective: 1000px; }
        .card-inner { position: relative; width: 100%; height: 100%; transition: transform 0.6s; transform-style: preserve-3d; cursor: pointer; }
        .card-inner.flipped { transform: rotateY(180deg); }
        .card-front, .card-back { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; border: 3px solid var(--gold); border-radius: 15px; }
        .card-front { background: #2c3e50; display: flex; align-items: center; justify-content: center; font-size: 50px; }
        .card-back { transform: rotateY(180deg); background-size: cover; background-position: center; }
        .notice-box { background: rgba(255,255,255,0.1); padding: 10px; border-radius: 10px; margin-bottom: 10px; color: #f1c40f; }
        .timer-text { font-size: 40px; color: #e74c3c; font-weight: bold; margin: 10px 0; }
    </style>
</head>
<body>

<div id="lobby" class="container">
    <h1>🐺 Werewolf Online</h1>
    <button onclick="showScreen('create-screen'); unlockVoice();">สร้างห้อง</button>
    <button class="btn-blue" onclick="joinManual()">เข้าร่วมด้วยรหัสห้อง</button>
    <hr style="opacity: 0.3; margin: 15px 0;">
    <div id="room-list">กำลังค้นหาห้อง...</div>
    <div class="credit">Card Game Creators by.lilyuux</div>
</div>

<div id="create-screen" class="container hidden">
    <h2>สร้างห้องใหม่</h2>
    <input type="text" id="hName" placeholder="ชื่อเล่นของคุณ">
    <input type="text" id="rName" placeholder="ชื่อห้อง">
    <input type="password" id="rPass" placeholder="รหัสผ่าน (ถ้ามี)">
    <select id="maxP"><option value="4">4 คน</option><option value="5">5 คน</option><option value="6">6 คน</option></select>
    <button onclick="createRoom()">ตกลงสร้างห้อง</button>
    <button style="background:#555" onclick="showScreen('lobby')">ย้อนกลับ</button>
</div>

<div id="waiting-room" class="container hidden">
    <h2 id="room-title"></h2>
    <div id="player-list"></div>
    <div id="host-controls" class="hidden" style="margin-top: 15px;">
        <button id="start-btn" onclick="startGame()" disabled>เริ่มเกม</button>
    </div>
    <div class="credit">Card Game Creators by.lilyuux</div>
</div>

<div id="game-screen" class="container hidden">
    <div id="role-area">
        <h3>บทบาทของคุณ (แตะที่การ์ด)</h3>
        <div class="card-reveal">
            <div class="card-inner" id="card-obj" onclick="this.classList.toggle('flipped')">
                <div class="card-front">?</div>
                <div id="role-img" class="card-back"></div>
            </div>
        </div>
        <p id="role-text" style="font-weight:bold; font-size: 22px; margin: 10px 0;"></p>
        <button id="ready-btn" class="btn-blue" onclick="playerReady()">พร้อมแล้ว</button>
    </div>

    <div id="action-area" class="hidden">
        <h2 id="phase-title"></h2>
        <div id="seer-notice" class="notice-box hidden"></div>
        <div id="target-btns"></div>
    </div>
    
    <div id="end-screen" class="hidden">
        <h1 id="win-title" style="font-size: 40px; margin-bottom: 5px;"></h1>
        <p>ผลสรุปบทบาทผู้เล่นทุกคน:</p>
        <div id="end-roles" style="text-align: left; background: rgba(0,0,0,0.3); padding: 15px; border-radius: 10px; margin-bottom: 20px;"></div>
        <button onclick="location.reload()">กลับสู่หน้าแรก</button>
    </div>
    <div class="credit">Card Game Creators by.lilyuux</div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
    const socket = io();
    let myRoom = '', myRole = '', isHost = false, lastGuard = '';
    let totalAlive = 0;
    let currentGameState = '';

    const ROLE_IMG = {
        "มนุษย์หมาป่า": "https://i.postimg.cc/GmgZtgFK/IMG-0044.jpg",
        "ผู้หยั่งรู้": "https://i.postimg.cc/W1YQzYG6/IMG-0042.jpg",
        "บอดี้การ์ด": "https://i.postimg.cc/NjCWFC6x/IMG-0043.jpg",
        "ชาวบ้าน": "https://i.postimg.cc/rwZvsZ1D/IMG-0041.jpg"
    };

    // ------------------------------------
    // ฟังก์ชันเสียงพากย์ (พูดเฉพาะเครื่อง Host)
    // ------------------------------------
    function unlockVoice() {
        if('speechSynthesis' in window) { window.speechSynthesis.speak(new SpeechSynthesisUtterance("")); }
    }
    function speakGame(text) {
        if (isHost && 'speechSynthesis' in window) {
            const msg = new SpeechSynthesisUtterance(text);
            msg.lang = 'th-TH';
            msg.rate = 0.95;
            window.speechSynthesis.speak(msg);
        }
    }

    function showScreen(id) {
        document.querySelectorAll('.container').forEach(el => el.classList.add('hidden'));
        document.getElementById(id).classList.remove('hidden');
    }

    function createRoom() {
        const n = document.getElementById('hName').value, r = document.getElementById('rName').value, p = document.getElementById('rPass').value, m = document.getElementById('maxP').value;
        if(n && r) socket.emit('createRoom', { roomId: r, playerName: n, maxPlayers: m, password: p });
    }

    function joinManual() { unlockVoice(); const rid = prompt("ใส่ชื่อห้อง:"); if(rid) joinRoomPrompt(rid, false); }
    function joinRoomPrompt(rid, hasP) { const n = prompt("ชื่อเล่นของคุณ:"); if(!n) return; socket.emit('joinRoom', { roomId: rid, playerName: n, password: (hasP?prompt("รหัสผ่าน:"): "") }); }

    socket.on('roomListUpdate', (rooms) => {
        const list = document.getElementById('room-list');
        list.innerHTML = rooms.length === 0 ? '<p style="color:#888;">ยังไม่มีใครสร้างห้อง</p>' : rooms.map(r => `
            <div class="room-card">
                <div><b>${r.id}</b> ${r.hasPassword?'🔒':''}<br><small>คนในห้อง: ${r.currentPlayers}/${r.maxPlayers}</small></div>
                <button style="width:auto; padding:5px 15px;" class="btn-blue" onclick="unlockVoice(); joinRoomPrompt('${r.id}', ${r.hasPassword})">เข้า</button>
            </div>`).join('');
    });

    socket.on('joined', (d) => { 
        myRoom = d.roomId; isHost = d.isHost; 
        showScreen('waiting-room'); 
        document.getElementById('room-title').innerText = "ห้อง: " + myRoom; 
        if(isHost) document.getElementById('host-controls').classList.remove('hidden'); 
    });

    socket.on('updateRoom', (room) => {
        const pList = document.getElementById('player-list');
        if(pList) pList.innerHTML = room.players.map(p => `
            <div class="player-item">
                <span>${p.name} ${p.isHost?'👑':''}</span>
                <span>${p.isReady?'✅ พร้อม':'⏳ รอ'}</span>
            </div>`).join('');
        
        if(isHost && room.state === 'LOBBY') {
            const btn = document.getElementById('start-btn');
            btn.disabled = room.players.length < 4;
            btn.innerText = room.players.length < 4 ? `ขาดอีก ${4-room.players.length} คน` : "เริ่มเกม";
        }

        // --- เช็คเพื่อเล่นเสียงพากย์ ---
        if (room.state !== currentGameState) {
            currentGameState = room.state;
            if (room.state === 'NIGHT_WOLF') speakGame("เข้าสู่กลางคืน มนุษย์หมาป่าลืมตา");
            else if (room.state === 'NIGHT_SEER') speakGame("มนุษย์หมาป่าหลับตา ผู้หยั่งรู้ลืมตา");
            else if (room.state === 'NIGHT_BODYGUARD') speakGame("ผู้หยั่งรู้หลับตา บอดี้การ์ดลืมตา");
            else if (room.state === 'DAY_TIME') speakGame("ทุกคนลืมตา เช้าแล้ว");
            else if (room.state === 'VOTING') speakGame("หมดเวลาพูดคุย เริ่มทำการโหวตได้");
            else if (room.state === 'GAME_OVER') speakGame("เกมจบแล้ว " + room.winner);
        }

        if(room.state === 'ROLE_REVEAL') {
            const me = room.players.find(p => p.id === socket.id);
            if(me) {
                myRole = me.role;
                showScreen('game-screen');
                document.getElementById('role-area').classList.remove('hidden');
                document.getElementById('action-area').classList.add('hidden');
                document.getElementById('end-screen').classList.add('hidden');
                
                document.getElementById('role-text').innerText = "คุณคือ: " + myRole;
                document.getElementById('role-img').style.backgroundImage = "url('" + ROLE_IMG[myRole] + "')";
                document.getElementById('ready-btn').disabled = false;
                document.getElementById('ready-btn').innerText = "พร้อมเข้าสู่กลางคืน";
            }
        }

        if(room.state.includes('NIGHT')) {
            document.getElementById('role-area').classList.add('hidden');
            document.getElementById('action-area').classList.remove('hidden');
            renderNight(room);
        }

        if(room.state === 'DAY_TIME') {
            const me = room.players.find(p => p.id === socket.id);
            document.getElementById('phase-title').innerText = "☀️ เช้าวันใหม่";
            const btns = document.getElementById('target-btns');
            
            let html = room.lastVictim ? `<p style="color:red; font-size:18px;">เมื่อคืน ${room.lastVictim} ถูกฆ่าตาย</p>` : "<p style='font-size:18px;'>ไม่มีใครตาย</p>";
            btns.innerHTML = html;
            
            if(me && me.isAlive) { 
                const b = document.createElement('button'); 
                b.innerText = "เมื่อคุยกันจบแล้ว กดเพื่อ 'เริ่มโหวต'"; 
                b.onclick = () => socket.emit('startVoting', myRoom); 
                btns.appendChild(b); 
            } else {
                btns.innerHTML += "<p style='color:#aaa'>คุณตายแล้ว รอคนเป็นโหวต...</p>";
            }
        }

        if(room.state === 'VOTING') {
            const me = room.players.find(p => p.id === socket.id);
            totalAlive = room.players.filter(p => p.isAlive).length;
            
            document.getElementById('phase-title').innerText = "⚖️ ช่วงโหวต!";
            const btns = document.getElementById('target-btns');
            
            let html = `<div class="notice-box" id="vote-count">คนโหวตแล้ว 0 / ${totalAlive} คน</div>`;
            html += `<div class="timer-text" id="vote-timer">15</div>`;
            btns.innerHTML = html;

            if(me && me.isAlive) {
                room.players.filter(p => p.isAlive && p.id !== socket.id).forEach(p => {
                    const b = document.createElement('button');
                    b.innerText = `โหวต ${p.name}`;
                    b.classList.add('vote-btn');
                    b.onclick = () => { socket.emit('castVote', { roomId: myRoom, targetId: p.id }); disableAllVotes(); };
                    btns.appendChild(b);
                });
                const skipBtn = document.createElement('button');
                skipBtn.innerText = "ข้ามการโหวต (Skip)";
                skipBtn.style.background = "#555";
                skipBtn.classList.add('vote-btn');
                skipBtn.onclick = () => { socket.emit('castVote', { roomId: myRoom, targetId: 'SKIP' }); disableAllVotes(); };
                btns.appendChild(skipBtn);
            } else {
                btns.innerHTML += "<p>คุณเป็นผี ทำได้แค่มอง...</p>";
            }
        }

        if(room.state === 'DAY_RESULT') {
            document.getElementById('phase-title').innerText = "ผลการโหวต";
            const btns = document.getElementById('target-btns');
            if (room.lastEliminated) btns.innerHTML = `<p style="color:red; font-size:20px; font-weight:bold;">มติเอกฉันท์: ${room.lastEliminated} ถูกโหวตออก!</p>`;
            else btns.innerHTML = `<p style="font-size:20px; font-weight:bold;">คะแนนไม่เอกฉันท์ (ไม่มีใครถูกโหวตออก)</p>`;
        }

        if(room.state === 'GAME_OVER') {
            document.getElementById('action-area').classList.add('hidden');
            document.getElementById('end-screen').classList.remove('hidden');
            const title = document.getElementById('win-title');
            title.innerText = room.winner;
            title.style.color = room.winner.includes('หมาป่า') ? 'var(--wolf)' : 'var(--seer)';
            document.getElementById('end-roles').innerHTML = room.players.map(p => `<p style="margin:5px 0;"><b>${p.name}:</b> ${p.role} ${p.isAlive ? '' : '💀'}</p>`).join('');
        }
    });

    function disableAllVotes() {
        document.querySelectorAll('.vote-btn').forEach(btn => btn.disabled = true);
        const notice = document.getElementById('vote-count');
        if(notice) notice.innerText = "ส่งผลโหวตแล้ว รอเวลาหมด...";
    }

    socket.on('voteCountUpdate', (count) => {
        const vc = document.getElementById('vote-count');
        if(vc) vc.innerText = `คนโหวตแล้ว ${count} / ${totalAlive} คน`;
    });

    socket.on('timerUpdate', (time) => {
        const timer = document.getElementById('vote-timer');
        if(timer) timer.innerText = time;
    });

    function renderNight(room) {
        const me = room.players.find(p => p.id === socket.id);
        const title = document.getElementById('phase-title'), btns = document.getElementById('target-btns');
        btns.innerHTML = "";
        if(!me.isAlive) { title.innerText = "คุณตายแล้ว ได้แต่เฝ้าดู..."; return; }

        if(room.state === 'NIGHT_WOLF' && myRole === 'มนุษย์หมาป่า') {
            title.innerText = "คืนนี้จะฆ่าใคร?";
            createBtns(room, 'WOLF_KILL');
        } else if(room.state === 'NIGHT_SEER' && myRole === 'ผู้หยั่งรู้') {
            title.innerText = "เลือกตรวจสอบ 1 คน";
            createBtns(room, 'SEER_CHECK');
        } else if(room.state === 'NIGHT_BODYGUARD' && myRole === 'บอดี้การ์ด') {
            title.innerText = "เลือกปกป้อง 1 คน";
            createBtns(room, 'GUARD_PROTECT');
        } else { 
            title.innerText = "🌙 นอนหลับ..."; 
            btns.innerHTML = "<p>รอผู้เล่นคนอื่นดำเนินการ...</p>"; 
        }
    }

    function createBtns(room, type) {
        room.players.filter(p => p.isAlive && p.id !== socket.id).forEach(p => {
            if(type === 'GUARD_PROTECT' && p.id === lastGuard) return; 
            const b = document.createElement('button');
            b.innerText = p.name;
            b.onclick = () => { 
                if(type === 'GUARD_PROTECT') lastGuard = p.id; 
                socket.emit('nightAction', { roomId: myRoom, targetId: p.id, actionType: type }); 
                document.getElementById('target-btns').innerHTML = "<p>ส่งคำสั่งแล้ว...</p>"; 
            };
            document.getElementById('target-btns').appendChild(b);
        });
    }

    socket.on('seerResult', (d) => { 
        const n = document.getElementById('seer-notice'); 
        n.classList.remove('hidden'); 
        n.innerText = `ผลการตรวจ: ${d.name} คือ ${d.result}`; 
    });

    function playerReady() { socket.emit('playerReady', myRoom); document.getElementById('ready-btn').disabled = true; document.getElementById('ready-btn').innerText = "รอคนอื่นกดพร้อม..."; }
    function startGame() { socket.emit('startGame', myRoom); }
    socket.on('errorMsg', (m) => alert(m));
</script>
</body>
</html>
