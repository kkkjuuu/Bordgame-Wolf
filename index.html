<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Werewolf Card Game</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0f0c29;
            --card-gold: #c5a059;
            --wolf-red: #e74c3c;
            --seer-blue: #3498db;
        }
        body {
            font-family: 'Kanit', sans-serif;
            margin: 0; background-color: var(--bg); color: white;
            overflow-x: hidden; transition: background 1s;
        }
        .victory-theme { background: #1a2a6c !important; } /* สีน้ำเงิน */
        .defeat-theme { background: #641e16 !important; } /* สีแดง */

        /* อนิเมชั่นฉากเปลี่ยน */
        .phase-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); z-index: 100;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            animation: fadeIn 0.5s;
        }
        @keyframes fadeIn { from {opacity: 0;} to {opacity: 1;} }

        /* การ์ดบทบาท */
        .card-reveal {
            perspective: 1000px; width: 250px; height: 380px; margin: 20px auto;
        }
        .card-inner {
            position: relative; width: 100%; height: 100%; text-align: center;
            transition: transform 0.8s; transform-style: preserve-3d; cursor: pointer;
        }
        .card-inner.flipped { transform: rotateY(180deg); }
        .card-front, .card-back {
            position: absolute; width: 100%; height: 100%; backface-visibility: hidden;
            border-radius: 15px; border: 3px solid var(--card-gold);
        }
        .card-front { background: #2c3e50; display: flex; align-items: center; justify-content: center; }
        .card-back { transform: rotateY(180deg); background-size: cover; background-position: center; }

        .container { max-width: 500px; margin: 0 auto; padding: 20px; text-align: center; }
        .btn { 
            width: 100%; padding: 15px; border: none; border-radius: 10px; 
            font-size: 18px; font-weight: bold; cursor: pointer; margin-top: 10px;
        }
        .btn-main { background: var(--wolf-red); color: white; }
        .btn-blue { background: var(--seer-blue); color: white; }
        input { 
            width: 100%; padding: 15px; margin: 10px 0; border-radius: 10px; 
            border: none; box-sizing: border-box; font-size: 16px;
        }
        .player-item {
            background: rgba(255,255,255,0.1); padding: 12px; margin: 5px 0;
            border-radius: 8px; display: flex; justify-content: space-between;
        }
        .timer { font-size: 40px; color: #f1c40f; font-weight: bold; }
        .reveal-list { text-align: left; background: rgba(0,0,0,0.5); padding: 20px; border-radius: 15px; }
    </style>
</head>
<body>

    <div id="lobby" class="container">
        <h1>🐺 Werewolf Online</h1>
        <div id="main-menu">
            <button class="btn btn-main" onclick="showScreen('create-screen')">สร้างห้อง</button>
            <button class="btn btn-blue" onclick="showScreen('join-screen')">เข้าร่วมห้อง</button>
        </div>

        <div id="create-screen" class="hidden" style="display:none;">
            <input type="text" id="hostName" placeholder="ชื่อของคุณ">
            <input type="text" id="roomCodeC" placeholder="รหัสห้อง">
            <input type="number" id="maxP" value="4" min="4" max="12">
            <button class="btn btn-main" onclick="createRoom()">สร้างและรอเพื่อน</button>
        </div>

        <div id="join-screen" class="hidden" style="display:none;">
            <input type="text" id="playerName" placeholder="ชื่อของคุณ">
            <input type="text" id="roomCodeJ" placeholder="รหัสห้อง">
            <button class="btn btn-blue" onclick="joinRoom()">เข้าร่วม</button>
        </div>
    </div>

    <div id="waiting-room" class="container" style="display:none;">
        <h2>ห้อง: <span id="room-id-display"></span></h2>
        <div id="player-list"></div>
        <button id="start-btn" class="btn btn-main hidden" onclick="startGame()">เริ่มเกม</button>
    </div>

    <div id="animation-overlay" class="phase-overlay" style="display:none;">
        <h1 id="ani-text" style="font-size: 60px;">3</h1>
    </div>

    <div id="game-screen" class="container" style="display:none;">
        <div id="role-reveal-area" style="display:none;">
            <h3>บทบาทของคุณคือ... (แตะเพื่อดู)</h3>
            <div class="card-reveal">
                <div class="card-inner" id="role-card" onclick="this.classList.toggle('flipped')">
                    <div class="card-front">?</div>
                    <div class="card-back" id="role-img"></div>
                </div>
            </div>
            <p id="role-desc"></p>
            <button class="btn btn-blue" onclick="setReady()">พร้อมเข้าสู่กลางคืน</button>
        </div>

        <div id="action-area" class="hidden">
            <h3 id="game-status"></h3>
            <ul id="target-list" class="player-list" style="list-style:none; padding:0;"></ul>
            <div id="vote-timer-area" style="display:none;">
                <div class="timer" id="timer-num">10</div>
                <p>โปรดเลือกคนที่จะโหวตออก!</p>
            </div>
        </div>

        <div id="end-screen" style="display:none;">
            <h1 id="win-text">คุณชนะ!</h1>
            <div class="reveal-list" id="final-roles"></div>
            <button class="btn btn-main" onclick="location.reload()">กลับหน้าหลัก</button>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        let myRoom = '';
        let myId = '';
        let myRole = '';

        // *** ใส่ URL รูปภาพของคุณที่นี่ ***
        const ROLE_IMAGES = {
            "มนุษย์หมาป่า": "https://i.postimg.cc/44LY7k5S/IMG-0044.jpg", // รูปมนุษย์หมาป่า
            "ผู้หยั่งรู้": "https://i.postimg.cc/zDtybZjQ/IMG-0042.jpg", // รูปผู้หยั่งรู้
            "บอดี้การ์ด": "https://i.postimg.cc/dQHhkPBS/IMG-0043.jpg", // รูปบอดี้การ์ด
            "ชาวบ้าน": "https://i.postimg.cc/7Ps5G8V9/IMG-0041.jpg"  // รูปชาวบ้าน
        };

        function showScreen(id) {
            document.querySelectorAll('.hidden').forEach(s => s.style.display = 'none');
            document.getElementById(id).style.display = 'block';
            document.getElementById('main-menu').style.display = 'none';
        }

        function createRoom() {
            const name = document.getElementById('hostName').value;
            const code = document.getElementById('roomCodeC').value;
            const max = document.getElementById('maxP').value;
            if(!name || !code) return alert('กรอกข้อมูลให้ครบ');
            myRoom = code;
            socket.emit('createRoom', { roomId: code, playerName: name, maxPlayers: max });
        }

        function joinRoom() {
            const name = document.getElementById('playerName').value;
            const code = document.getElementById('roomCodeJ').value;
            if(!name || !code) return alert('กรอกข้อมูลให้ครบ');
            myRoom = code;
            socket.emit('joinRoom', { roomId: code, playerName: name });
        }

        function startGame() {
            socket.emit('startGame', myRoom);
        }

        socket.on('updateRoom', (room) => {
            myId = socket.id;
            const me = room.players.find(p => p.id === socket.id);
            if(me) myRole = me.role;

            if (room.state === 'LOBBY') {
                document.getElementById('lobby').style.display = 'none';
                document.getElementById('waiting-room').style.display = 'block';
                document.getElementById('room-id-display').innerText = myRoom;
                document.getElementById('player-list').innerHTML = room.players.map(p => 
                    `<div class="player-item">${p.name} ${p.isHost ? '👑' : ''}</div>`).join('');
                if(me.isHost && room.players.length >= 4) document.getElementById('start-btn').classList.remove('hidden');
            }

            if (room.state === 'STARTING') {
                document.getElementById('waiting-room').style.display = 'none';
                const ani = document.getElementById('animation-overlay');
                ani.style.display = 'flex';
                let c = 3;
                const int = setInterval(() => {
                    c--;
                    document.getElementById('ani-text').innerText = c;
                    if(c <= 0) {
                        clearInterval(int);
                        ani.style.display = 'none';
                    }
                }, 1000);
            }

            if (room.state === 'ROLE_REVEAL') {
                document.getElementById('game-screen').style.display = 'block';
                document.getElementById('role-reveal-area').style.display = 'block';
                document.getElementById('role-img').style.backgroundImage = `url(${ROLE_IMAGES[myRole] || ''})`;
                speak(`คุณคือ ${myRole}`);
            }

            if (room.state === 'NIGHT_TIME' || room.state === 'NIGHT_WOLF' || room.state === 'NIGHT_SHERIFF') {
                document.getElementById('role-reveal-area').style.display = 'none';
                document.getElementById('action-area').classList.remove('hidden');
                handleNightActions(room);
            }

            if (room.state === 'DAY_TIME') {
                document.getElementById('action-area').classList.remove('hidden');
                document.getElementById('game-status').innerText = `เช้าวันใหม่: ${room.lastVictim ? room.lastVictim + ' ถูกฆ่าตาย' : 'ไม่มีใครตาย'}`;
                speak(`ทุกคนลืมตา ${room.lastVictim ? room.lastVictim + 'ถูกฆ่า' : 'ไม่มีใครตาย'}`);
                if(!me.isAlive) alert('คุณตายแล้ว!');
                renderTargets(room, 'VOTE');
            }

            if (room.state === 'VOTE_RESULT') {
                alert(`มติเอกฉันท์: ${room.lastEliminated} ถูกโหวตออก`);
            }

            if (room.state === 'GAME_OVER') {
                document.getElementById('action-area').style.display = 'none';
                document.getElementById('end-screen').style.display = 'block';
                const isWin = (room.winner === 'WOLVES' && myRole === 'มนุษย์หมาป่า') || (room.winner === 'VILLAGERS' && myRole !== 'มนุษย์หมาป่า');
                document.getElementById('win-text').innerText = isWin ? 'ชัยชนะ!' : 'พ่ายแพ้...';
                document.body.className = isWin ? 'victory-theme' : 'defeat-theme';
                document.getElementById('final-roles').innerHTML = room.players.map(p => 
                    `<p>${p.name}: <b>${p.role}</b> ${p.isAlive ? '' : '💀'}</p>`).join('');
            }
        });

        socket.on('timerUpdate', (t) => {
            document.getElementById('vote-timer-area').style.display = 'block';
            document.getElementById('timer-num').innerText = t;
        });

        function handleNightActions(room) {
            const me = room.players.find(p => p.id === myId);
            const status = document.getElementById('game-status');
            const targetList = document.getElementById('target-list');
            targetList.innerHTML = '';

            if (myRole === 'มนุษย์หมาป่า' && me.isAlive) {
                status.innerText = "คืนนี้หมาป่าจะฆ่าใคร?";
                renderTargets(room, 'WOLF_KILL');
            } else if (myRole === 'บอดี้การ์ด' && me.isAlive) {
                status.innerText = "บอดี้การ์ดจะปกป้องใคร?";
                renderTargets(room, 'BODYGUARD_PROTECT');
            } else if (myRole === 'ผู้หยั่งรู้' && me.isAlive) {
                status.innerText = "ผู้หยั่งรู้จะตรวจสอบใคร?";
                renderTargets(room, 'SEER_CHECK');
            } else {
                status.innerText = "คุณกำลังหลับตา...";
            }
        }

        function renderTargets(room, type) {
            const list = document.getElementById('target-list');
            list.innerHTML = room.players.filter(p => p.isAlive && p.id !== myId).map(p => 
                `<button class="btn btn-blue" onclick="executeAction('${p.id}', '${type}')">${p.name}</button>`
            ).join('');
            
            if (room.state === 'DAY_TIME' && room.players.find(p => p.id === myId).isAlive) {
                const btn = document.createElement('button');
                btn.className = 'btn btn-main';
                btn.innerText = 'เริ่มโหวต (ทุกคนพร้อมแล้ว)';
                btn.onclick = () => socket.emit('startVoting', myRoom);
                list.appendChild(btn);
            }
        }

        function executeAction(tid, type) {
            if (type === 'SEER_CHECK') {
                const p = socket.roomData.players.find(x => x.id === tid);
                alert(`${p.name} คือ ${p.role}`);
                socket.emit('nightAction', { roomId: myRoom, targetId: tid, actionType: 'DONE' });
            } else if (type === 'VOTE') {
                socket.emit('castVote', { roomId: myRoom, targetId: tid });
                alert('ส่งคะแนนโหวตแล้ว');
            } else {
                socket.emit('nightAction', { roomId: myRoom, targetId: tid, actionType: type });
            }
        }

        function speak(text) {
            const u = new SpeechSynthesisUtterance(text);
            u.lang = 'th-TH';
            window.speechSynthesis.speak(u);
        }

        socket.on('errorMsg', (m) => alert(m));
    </script>
</body>
</html>
