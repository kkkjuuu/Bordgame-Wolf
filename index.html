<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Werewolf Online - Card Game Creator by.lilyuux</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #0f0c29; --wolf: #e74c3c; --seer: #3498db; --gold: #c5a059; --guard: #27ae60; }
        body { font-family: 'Kanit', sans-serif; margin: 0; background: var(--bg); color: white; text-align: center; }
        .container { background: #16213e; padding: 25px; border-radius: 20px; width: 90%; max-width: 400px; margin: 20px auto; box-shadow: 0 10px 30px rgba(0,0,0,0.5); position: relative; }
        .credit { font-size: 12px; color: #888; margin-top: 15px; font-style: italic; }
        input, select, button { width: 100%; padding: 12px; margin: 8px 0; border-radius: 8px; border: none; font-size: 16px; font-family: 'Kanit'; box-sizing: border-box; }
        button { background: var(--wolf); color: white; cursor: pointer; font-weight: bold; }
        .btn-blue { background: var(--seer); }
        .btn-green { background: var(--guard); }
        .room-card { background: rgba(255,255,255,0.1); padding: 12px; margin: 8px 0; border-radius: 10px; display: flex; justify-content: space-between; align-items: center; text-align: left; }
        .player-item { background: rgba(255,255,255,0.1); padding: 10px; margin: 5px 0; border-radius: 8px; display: flex; justify-content: space-between; }
        .hidden { display: none !important; }
        .card-reveal { width: 220px; height: 320px; margin: 20px auto; perspective: 1000px; }
        .card-inner { position: relative; width: 100%; height: 100%; transition: transform 0.6s; transform-style: preserve-3d; cursor: pointer; }
        .card-inner.flipped { transform: rotateY(180deg); }
        .card-front, .card-back { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; border: 3px solid var(--gold); border-radius: 15px; }
        .card-front { background: #2c3e50; display: flex; align-items: center; justify-content: center; font-size: 40px; }
        .card-back { transform: rotateY(180deg); background-size: cover; background-position: center; }
        .msg-box { background: rgba(255,255,255,0.1); padding: 15px; border-radius: 10px; margin: 10px 0; border-left: 5px solid var(--seer); }
    </style>
</head>
<body>

<div id="lobby" class="container">
    <h1>🐺 Werewolf Online</h1>
    <div id="main-menu">
        <button onclick="showScreen('create-screen')">สร้างห้อง</button>
        <button class="btn-blue" onclick="joinManual()">เข้าร่วมด้วยชื่อห้อง</button>
        <hr>
        <div id="room-list">กำลังค้นหาห้อง...</div>
    </div>

    <div id="create-screen" class="hidden">
        <input type="text" id="hName" placeholder="ชื่อของคุณ">
        <input type="text" id="rName" placeholder="ชื่อห้อง">
        <input type="password" id="rPass" placeholder="รหัสผ่าน (ถ้ามี)">
        <select id="maxP"><option value="4">4 คน</option><option value="5">5 คน</option><option value="6">6 คน</option></select>
        <button onclick="createRoom()">ตกลงสร้างห้อง</button>
    </div>
    <div class="credit">Card Game Creators by.lilyuux</div>
</div>

<div id="game-screen" class="container hidden">
    <div id="role-area">
        <h3>บทบาทของคุณ</h3>
        <div class="card-reveal">
            <div class="card-inner" id="card-obj" onclick="this.classList.toggle('flipped')">
                <div class="card-front">?</div>
                <div id="role-img" class="card-back"></div>
            </div>
        </div>
        <p id="role-text" style="font-weight:bold; font-size: 20px;"></p>
        <p id="role-skill" style="font-size: 14px; color: #ccc;"></p>
        <button id="ready-btn" class="btn-blue" onclick="playerReady()">พร้อมแล้ว</button>
    </div>

    <div id="action-area" class="hidden">
        <h2 id="phase-title"></h2>
        <div id="seer-notice" class="msg-box hidden"></div>
        <div id="target-btns"></div>
    </div>
    
    <div class="credit">Card Game Creators by.lilyuux</div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
    const socket = io();
    let myRoom = '', myRole = '', lastTarget = '';

    const ROLE_INFO = {
        "มนุษย์หมาป่า": { skill: "ฆ่าคนในตอนกลางคืน", img: "url('https://i.ibb.co/p6V1N5R/wolf.png')" },
        "ผู้หยั่งรู้": { skill: "ตรวจสอบว่าใครเป็นคนดีหรือคนร้าย", img: "url('https://i.ibb.co/9v8yX7M/seer.png')" },
        "บอดี้การ์ด": { skill: "ปกป้องคนจากหมาป่า (ห้ามกันคนเดิมซ้ำ)", img: "url('https://i.ibb.co/M7y8yX1/guard.png')" },
        "ชาวบ้าน": { skill: "ตามหาหมาป่าและโหวตออกเพื่อชนะ", img: "url('https://i.ibb.co/tZ5M1mX/villager.png')" }
    };

    socket.on('updateRoom', (room) => {
        const me = room.players.find(p => p.id === socket.id);
        if(!me) return;

        if(room.state === 'ROLE_REVEAL') {
            myRole = me.role;
            showScreen('game-screen');
            document.getElementById('role-text').innerText = myRole;
            document.getElementById('role-skill').innerText = ROLE_INFO[myRole].skill;
            document.getElementById('role-img').style.backgroundImage = ROLE_INFO[myRole].img;
        }

        if(room.state.includes('NIGHT')) {
            document.getElementById('role-area').classList.add('hidden');
            document.getElementById('action-area').classList.remove('hidden');
            renderNight(room, me);
        }

        if(room.state === 'DAY_TIME') {
            document.getElementById('phase-title').innerText = "☀️ เช้าวันใหม่";
            document.getElementById('target-btns').innerHTML = room.lastVictim ? `<p style="color:red">เมื่อคืน ${room.lastVictim} ถูกฆ่า</p>` : "<p>ไม่มีใครตายในคืนนี้</p>";
            if(me.isAlive && me.isHost) {
                const btn = document.createElement('button');
                btn.innerText = "เริ่มการโหวต";
                btn.onclick = () => socket.emit('startVoting', myRoom);
                document.getElementById('target-btns').appendChild(btn);
            }
        }
    });

    function renderNight(room, me) {
        const title = document.getElementById('phase-title');
        const btns = document.getElementById('target-btns');
        btns.innerHTML = "";
        
        if(!me.isAlive) { title.innerText = "คุณตายแล้ว..."; return; }

        if(room.state === 'NIGHT_WOLF' && myRole === 'มนุษย์หมาป่า') {
            title.innerText = "คืนนี้จะฆ่าใคร?";
            createTargetButtons(room, 'WOLF_KILL');
        } else if(room.state === 'NIGHT_SEER' && myRole === 'ผู้หยั่งรู้') {
            title.innerText = "จะตรวจสอบใคร?";
            createTargetButtons(room, 'SEER_CHECK');
        } else if(room.state === 'NIGHT_BODYGUARD' && myRole === 'บอดี้การ์ด') {
            title.innerText = "จะปกป้องใคร?";
            createTargetButtons(room, 'GUARD_PROTECT');
        } else {
            title.innerText = "🌙 นอนหลับ...";
            btns.innerHTML = "รอคนอื่นใช้สกิล...";
        }
    }

    function createTargetButtons(room, action) {
        const btns = document.getElementById('target-btns');
        room.players.filter(p => p.isAlive && p.id !== socket.id).forEach(p => {
            // เงื่อนไขบอดี้การ์ด ห้ามกันคนเดิม
            if(action === 'GUARD_PROTECT' && p.id === lastTarget) return;

            const b = document.createElement('button');
            b.innerText = p.name;
            b.onclick = () => {
                if(action === 'GUARD_PROTECT') lastTarget = p.id;
                socket.emit('nightAction', { roomId: myRoom, targetId: p.id, actionType: action });
                btns.innerHTML = "ส่งคำสั่งแล้ว...";
            };
            btns.appendChild(b);
        });
    }

    socket.on('seerResult', (data) => {
        const notice = document.getElementById('seer-notice');
        notice.classList.remove('hidden');
        notice.innerText = `ผลการตรวจ: ${data.name} คือ ${data.result}`;
    });

    function playerReady() { socket.emit('playerReady', myRoom); document.getElementById('ready-btn').disabled = true; }
    function showScreen(id) { document.querySelectorAll('.container, #lobby, #game-screen').forEach(el => el.classList.add('hidden')); document.getElementById(id).classList.remove('hidden'); }
    // ... ฟังก์ชันเสริมอื่นๆ ...
</script>
</body>
</html>
