<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Werewolf Pro by.lilyuux</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #0f0c29; --wolf: #e74c3c; --seer: #3498db; --gold: #c5a059; --guard: #27ae60; --table-black: #000000; --table-grey: #555555; --profile-purple: #8b5cf6; }
        body { font-family: 'Kanit', sans-serif; margin: 0; background: var(--bg); color: white; text-align: center; }
        .container { background: #16213e; padding: 20px; border-radius: 20px; width: 90%; max-width: 400px; margin: 20px auto; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .credit { font-size: 12px; color: #888; margin-top: 15px; }
        input, select, button { width: 100%; padding: 12px; margin: 8px 0; border-radius: 8px; border: none; font-size: 16px; font-family: 'Kanit'; box-sizing: border-box; }
        button { background: var(--wolf); color: white; cursor: pointer; font-weight: bold; transition: 0.3s; }
        button:hover { filter: brightness(1.1); }
        button:disabled { background: #555 !important; cursor: not-allowed; }
        .btn-blue { background: var(--seer); }
        .btn-green { background: var(--guard); }
        .room-card { background: rgba(255,255,255,0.1); padding: 10px; margin: 10px 0; border-radius: 10px; display: flex; justify-content: space-between; align-items: center; text-align: left; }
        .player-item { background: rgba(255,255,255,0.1); padding: 10px; margin: 5px 0; border-radius: 8px; display: flex; justify-content: space-between; align-items: center;}
        .hidden { display: none !important; }
        .card-reveal { width: 220px; height: 320px; margin: 15px auto; perspective: 1000px; }
        .card-inner { position: relative; width: 100%; height: 100%; transition: transform 0.6s; transform-style: preserve-3d; cursor: pointer; }
        .card-inner.flipped { transform: rotateY(180deg); }
        .card-front, .card-back { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; border: 3px solid var(--gold); border-radius: 15px; }
        .card-front { background: #2c3e50; display: flex; align-items: center; justify-content: center; font-size: 50px; }
        .card-back { transform: rotateY(180deg); background-size: cover; background-position: center; }
        .timer-text { font-size: 40px; color: #e74c3c; font-weight: bold; margin: 10px 0; }
        
        .profile-box { background: rgba(255,255,255,0.05); padding: 15px; border-radius: 10px; margin-bottom: 15px; position: relative; }
        .profile-img { width: 90px; height: 90px; border-radius: 50%; border: 3px solid var(--gold); object-fit: cover; background: #2c3e50; }
        
        .avatar-grid { display: flex; flex-wrap: wrap; gap: 15px; justify-content: center; margin: 20px 0; }
        .avatar-option { width: 80px; height: 80px; border-radius: 50%; border: 3px solid transparent; cursor: pointer; object-fit: cover; transition: 0.3s; background: #2c3e50; }
        .avatar-option.selected { border-color: var(--gold); box-shadow: 0 0 15px var(--gold); transform: scale(1.1); }

        #game-table-screen { 
            width: 100%; 
            max-width: 500px; 
            margin: 80px auto 20px auto; 
            position: relative;
        }

        .neon-table-bg {
            background: radial-gradient(circle, #0f172a 0%, #000000 100%);
            width: 80%;
            height: 240px;
            margin: 0 auto;
            border-radius: 12px;
            border: 3px solid #3ebdf8; 
            box-shadow: 0 0 15px rgba(62, 189, 248, 0.5), inset 0 0 20px rgba(62, 189, 248, 0.2);
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .neon-table-bg::after {
            content: "CARD GAME BY LILYUU.CCO";
            position: absolute;
            bottom: 12px;
            font-size: 10px;
            font-weight: 700;
            color: rgba(62, 189, 248, 0.3);
            letter-spacing: 2px;
            pointer-events: none; 
        }

        .table-center-content {
            z-index: 5;
            text-align: center;
            color: white;
            text-shadow: 1px 1px 4px #000;
        }

        .player-spot {
            position: absolute;
            width: 70px;
            display: flex;
            flex-direction: column;
            align-items: center;
            z-index: 10;
        }

        .neon-player-box {
            width: 70px;
            height: 70px;
            background: #000;
            border-radius: 12px;
            border: 3px solid #3ebdf8;
            box-shadow: 0 0 15px rgba(62, 189, 248, 0.5);
            padding: 3px;
            box-sizing: border-box;
            position: relative;
            transition: 0.2s;
        }

        .player-avatar-spot {
            width: 100%;
            height: 100%;
            border-radius: 8px;
            object-fit: cover;
            background: #111;
        }

        .pos-top-left { top: -35px; left: -35px; }
        .pos-top-center { top: -35px; left: 50%; transform: translateX(-50%); }
        .pos-top-right { top: -35px; right: -35px; }
        .pos-bottom-left { bottom: -35px; left: -35px; }
        .pos-bottom-center { bottom: -35px; left: 50%; transform: translateX(-50%); }
        .pos-bottom-right { bottom: -35px; right: -35px; }

        .player-name {
            margin-top: 5px;
            font-size: 12px;
            background: rgba(0,0,0,0.8);
            padding: 2px 6px;
            border-radius: 5px;
            white-space: nowrap;
            max-width: 80px;
            overflow: hidden;
            text-overflow: ellipsis;
            color: #fff;
        }

        .player-ready {
            font-size: 11px;
            color: #ddd;
            margin-top: 2px;
            background: rgba(0,0,0,0.5);
            padding: 0 5px;
            border-radius: 3px;
        }

        .overlay-icon {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-size: 80%;
            background-repeat: no-repeat;
            background-position: center;
            z-index: 5;
            background-color: rgba(0,0,0,0.5); 
            border-radius: 8px;
        }

        .player-spot.targetable .neon-player-box {
            cursor: pointer;
            box-shadow: 0 0 20px 8px #3ebdf8;
            animation: pulse 1.5s infinite;
            border-color: #fff;
        }
        .player-spot.targetable:hover .neon-player-box { transform: scale(1.1); }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

    </style>
</head>
<body>

<div id="lobby" class="container">
    <h1>🐺 Werewolf Online</h1>
    <div class="profile-box">
        <img src="" alt="Profile" class="profile-img" id="playerAvatar">
        <br>
        <button onclick="openAvatarSelect()" class="btn-blue" style="width: auto; padding: 5px 15px; font-size: 14px; margin-top: -15px; border-radius: 20px; position: relative; z-index: 2;">✏️ เปลี่ยนรูป</button>
        <input type="text" id="playerNameInput" placeholder="ตั้งชื่อของคุณ..." maxlength="15" style="text-align: center; margin-top: 10px;">
        <button onclick="saveProfile()" class="btn-green" style="margin-top: 5px; padding: 8px;">💾 บันทึกโปรไฟล์</button>
        <p id="saveMessage" class="hidden" style="color: var(--guard); font-size: 14px; margin-top: 5px; font-weight: bold;">บันทึกสำเร็จ!</p>
    </div>
    <button onclick="showScreen('create-screen'); unlockVoice();">สร้างห้อง</button>
    <button class="btn-blue" onclick="joinManual()">เข้าร่วมด้วยรหัสห้อง</button>
    <hr style="opacity: 0.3; margin: 15px 0;">
    <div id="room-list">กำลังค้นหาห้อง...</div>
    <div class="credit">Card Game Creators by.lilyuux</div>
</div>

<div id="avatar-screen" class="container hidden">
    <h2>เลือกรูปโปรไฟล์ของคุณ</h2>
    <div id="avatar-grid" class="avatar-grid"></div>
    <button style="background:#555" onclick="showScreen('lobby')">ย้อนกลับ</button>
</div>

<div id="create-screen" class="container hidden">
    <h2>สร้างห้องใหม่</h2>
    <input type="text" id="hName" placeholder="ชื่อเล่นของคุณ">
    <input type="text" id="rName" placeholder="ชื่อห้อง">
    <input type="password" id="rPass" placeholder="รหัสผ่าน (ถ้ามี)">
    <select id="maxP"><option value="4">4 คน</option><option value="5">5 คน</option><option value="6">6 คน</option></select>
    <button onclick="createRoom()">ตกลงสร้างห้อง</button>
    <button style="background:#555" onclick="showScreen('lobby')">ย้อนกลับ</button>
</div>

<div id="waiting-room" class="container hidden">
    <h2 id="room-title"></h2>
    <div id="player-list"></div>
    <div id="host-controls" class="hidden" style="margin-top: 15px;">
        <button id="start-btn" onclick="startGame()" disabled>เริ่มเกม</button>
    </div>
    <div class="credit">Card Game Creators by.lilyuux</div>
</div>

<div id="game-screen" class="container hidden">
    <div id="role-area">
        <h3>บทบาทของคุณ (แตะที่การ์ด)</h3>
        <div class="card-reveal">
            <div class="card-inner" id="card-obj" onclick="this.classList.toggle('flipped')">
                <div class="card-front">?</div>
                <div id="role-img" class="card-back"></div>
            </div>
        </div>
        <p id="role-text" style="font-weight:bold; font-size: 22px; margin: 10px 0;"></p>
        <button id="ready-btn" class="btn-blue" onclick="playerReady()">พร้อมเข้าสู่กลางคืน</button>
    </div>
</div>

<div id="game-table-screen" class="hidden">
    <div class="neon-table-bg">
        <div class="table-center-content" id="table-central-rect">
            <h3 style="margin:0 0 5px 0; font-size:20px; color:#f1c40f;" id="phase-title">🌙 กลางคืน</h3>
            <div id="status-text" style="margin:0; font-size: 14px; line-height: 1.4;"></div>
            <p id="timer-text" class="hidden timer-text"></p>
        </div>

        <div id="player-spots"></div>
    </div>
    
    <div id="table-controls" class="hidden" style="margin-top: 60px; width: 90%; max-width: 400px; margin-left: auto; margin-right: auto;"></div>
    
    <div id="end-screen" class="hidden container" style="margin-top: 50px;">
        <h1 id="win-title" style="font-size: 40px; margin-bottom: 5px;"></h1>
        <div id="end-roles" style="text-align: left; background: rgba(0,0,0,0.3); padding: 15px; border-radius: 10px; margin-bottom: 20px;"></div>
        <button id="play-again-btn" class="btn-green" onclick="playAgain()">เล่นต่อ (Play Again)</button>
        <button style="background:#555; margin-top:10px;" onclick="location.reload()">ออกไปหน้าแรก</button>
    </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
    const socket = io();
    let myRoom = '', myRole = '', isHost = false, lastGuard = '';
    let totalAlive = 0, currentGameState = '';

    const ROLE_IMG = {
        "มนุษย์หมาป่า": "https://i.postimg.cc/cH4TvQcd/IMG-0044.jpg",
        "ผู้หยั่งรู้": "https://i.postimg.cc/G2hz4kjr/IMG-0042.jpg",
        "บอดี้การ์ด": "https://i.postimg.cc/pTXkmDB2/IMG-0043.jpg",
        "ชาวบ้าน": "https://i.postimg.cc/pdBqV0KX/IMG-0041.jpg"
    };
    
    const ICON_IMG = {
        " skull": "https://i.postimg.cc/XJWz04gS/IMG-0065.png",
        " shield": "https://i.postimg.cc/0NDB3bDF/IMG-0064.png"
    };

    const AVATARS = [
        "https://i.postimg.cc/SRwj1TW2/Untitled-design.png", "https://i.postimg.cc/dQX701zP/Untitled-design.png",
        "https://i.postimg.cc/2jJq56Pz/Untitled-design.png", "https://i.postimg.cc/mZqcrD0L/Untitled-design.png",
        "https://i.postimg.cc/CMtZK1WM/Untitled-design.png", "https://i.postimg.cc/0536NQLb/Untitled-design.png",
        "https://i.postimg.cc/RC830FjK/Untitled-design.png"
    ];
    let currentAvatar = AVATARS[0];

    function openAvatarSelect() { showScreen('avatar-screen'); document.getElementById('avatar-grid').innerHTML = AVATARS.map(url => `<img src="${url}" class="avatar-option ${url === currentAvatar ? 'selected' : ''}" onclick="selectAvatar('${url}')">`).join(''); }
    function selectAvatar(url) { currentAvatar = url; document.getElementById('playerAvatar').src = currentAvatar; localStorage.setItem('boardgame_playerAvatar', currentAvatar); showScreen('lobby'); }
    function generateWolfName() { return `wolf#${Math.floor(Math.random() * 999) + 1}`.padStart(8, '0'); }

    function loadProfile() {
        let savedName = localStorage.getItem('boardgame_playerName');
        if (!savedName) { savedName = generateWolfName(); localStorage.setItem('boardgame_playerName', savedName); }
        document.getElementById('playerNameInput').value = savedName; document.getElementById('hName').value = savedName; 

        let savedAvatar = localStorage.getItem('boardgame_playerAvatar');
        if (!savedAvatar || !AVATARS.includes(savedAvatar)) savedAvatar = AVATARS[0];
        currentAvatar = savedAvatar; document.getElementById('playerAvatar').src = currentAvatar;
    }

    function saveProfile() {
        const nameInput = document.getElementById('playerNameInput'); let newName = nameInput.value.trim();
        if (newName === "") { newName = generateWolfName(); nameInput.value = newName; }
        localStorage.setItem('boardgame_playerName', newName); document.getElementById('hName').value = newName;
        const msg = document.getElementById('saveMessage'); msg.classList.remove('hidden'); setTimeout(() => msg.classList.add('hidden'), 2000);
    }
    window.onload = () => { loadProfile(); };

    function unlockVoice() { if('speechSynthesis' in window) { window.speechSynthesis.speak(new SpeechSynthesisUtterance("")); } }
    function speakGame(text) { if (isHost && 'speechSynthesis' in window) { const msg = new SpeechSynthesisUtterance(text); msg.lang = 'th-TH'; msg.rate = 0.95; window.speechSynthesis.speak(msg); } }

    function showScreen(id) {
        document.querySelectorAll('.container, #game-table-screen').forEach(el => el.classList.add('hidden'));
        document.getElementById(id).classList.remove('hidden');
    }

    function createRoom() {
        let n = document.getElementById('hName').value.trim(); if(!n) n = generateWolfName();
        localStorage.setItem('boardgame_playerName', n); document.getElementById('playerNameInput').value = n;
        const r = document.getElementById('rName').value, p = document.getElementById('rPass').value, m = document.getElementById('maxP').value;
        if(n && r) socket.emit('createRoom', { roomId: r, playerName: n, maxPlayers: m, password: p, avatarUrl: currentAvatar });
    }

    function joinManual() { unlockVoice(); const rid = prompt("ใส่ชื่อห้อง:"); if(rid) joinRoomPrompt(rid, false); }
    function joinRoomPrompt(rid, hasP) { 
        unlockVoice(); let n = prompt("ชื่อเล่นของคุณ:", localStorage.getItem('boardgame_playerName') || generateWolfName()); 
        if(!n) return; localStorage.setItem('boardgame_playerName', n); document.getElementById('playerNameInput').value = n;
        socket.emit('joinRoom', { roomId: rid, playerName: n, password: (hasP?prompt("รหัสผ่าน:"): ""), avatarUrl: currentAvatar }); 
    }

    function generateTableSpots(maxPlayers) {
        const spots = document.getElementById('player-spots');
        spots.innerHTML = ''; 

        let positions = [];
        if (maxPlayers === '4') {
            positions = ['pos-top-left', 'pos-top-right', 'pos-bottom-left', 'pos-bottom-right'];
        } else if (maxPlayers === '5') {
            positions = ['pos-top-left', 'pos-top-center', 'pos-top-right', 'pos-bottom-left', 'pos-bottom-right'];
        } else if (maxPlayers === '6') {
            positions = ['pos-top-left', 'pos-top-center', 'pos-top-right', 'pos-bottom-left', 'pos-bottom-center', 'pos-bottom-right'];
        } else {
            positions = ['pos-top-left', 'pos-top-right', 'pos-bottom-left', 'pos-bottom-right'];
        }

        for (let i = 0; i < positions.length; i++) {
            spots.innerHTML += `
                <div class="player-spot ${positions[i]}" id="spot-index-${i}">
                    <div class="neon-player-box">
                        <img src="" class="player-avatar-spot" id="spot-index-${i}-avatar">
                        <div id="spot-index-${i}-skull" class="overlay-icon hidden" style="background-image:url('${ICON_IMG[' skull']}'); background-color: rgba(0,0,0,0.6);"></div>
                        <div id="spot-index-${i}-shield" class="overlay-icon hidden" style="background-image:url('${ICON_IMG[' shield']}')"></div>
                    </div>
                    <div class="player-name" id="spot-index-${i}-name">?</div>
                    <div class="player-ready" id="spot-index-${i}-ready">รอ</div> 
                </div>
            `;
        }
    }

    function renderPlayersOnTable(room) {
        const spotsContainer = document.getElementById('player-spots');
        if (!spotsContainer || spotsContainer.children.length !== parseInt(room.maxPlayers)) {
            generateTableSpots(room.maxPlayers.toString());
        }

        room.players.forEach((p, i) => {
            const spotId = `spot-index-${i}`;
            const spot = document.getElementById(spotId);
            
            const avatar = document.getElementById(`${spotId}-avatar`); if(avatar) avatar.src = p.avatarUrl || AVATARS[i % AVATARS.length]; 
            
            const isMe = p.id === socket.id;
            const name = document.getElementById(`${spotId}-name`); 
            if(name) name.innerText = p.name + (p.isHost?'👑':'') + (isMe?' (คุณ)':'');
            
            const ready = document.getElementById(`${spotId}-ready`); 
            if(ready) {
                if (room.state === 'LOBBY' || room.state === 'ROLE_REVEAL') {
                    ready.classList.remove('hidden');
                    ready.innerText = p.isReady ? '✅ พร้อม' : 'รอ'; 
                } else {
                    ready.classList.add('hidden'); 
                }
            }
            
            const skull = document.getElementById(`${spotId}-skull`); if(skull) { if(!p.isAlive) skull.classList.remove('hidden'); else skull.classList.add('hidden'); }
            const shield = document.getElementById(`${spotId}-shield`); if(shield) { if(p.isAlive && currentGameState === 'DAY_TIME' && room.shieldTarget === p.id) shield.classList.remove('hidden'); else shield.classList.add('hidden'); }

            spot.onclick = null;
            spot.classList.remove('targetable');

            if(p.isAlive && !isMe) {
                const me = room.players.find(x => x.id === socket.id);
                if(me && me.isAlive) {
                    let canTarget = false;
                    let actionType = '';

                    if(room.state === 'NIGHT_WOLF' && me.role === 'มนุษย์หมาป่า') { canTarget = true; actionType = 'WOLF_KILL'; }
                    else if(room.state === 'NIGHT_SEER' && me.role === 'ผู้หยั่งรู้') { canTarget = true; actionType = 'SEER_CHECK'; }
                    else if(room.state === 'NIGHT_BODYGUARD' && me.role === 'บอดี้การ์ด' && p.id !== lastGuard) { canTarget = true; actionType = 'GUARD_PROTECT'; }
                    else if(room.state === 'VOTING') { canTarget = true; actionType = 'VOTE'; }

                    if(canTarget) {
                        spot.classList.add('targetable');
                        spot.onclick = () => {
                            let confirmMsg = "";
                            if (actionType === 'VOTE') confirmMsg = `คุณต้องการจะโหวต ${p.name} ใช่หรือไม่?`;
                            else if (actionType === 'WOLF_KILL') confirmMsg = `คุณต้องการจะฆ่า ${p.name} ใช่หรือไม่?`;
                            else if (actionType === 'SEER_CHECK') confirmMsg = `คุณต้องการตรวจบทบาทของ ${p.name} ใช่หรือไม่?`;
                            else if (actionType === 'GUARD_PROTECT') confirmMsg = `คุณต้องการจะปกป้อง ${p.name} ใช่หรือไม่?`;

                            if(confirm(confirmMsg)) {
                                if(actionType === 'VOTE') {
                                    socket.emit('castVote', { roomId: myRoom, targetId: p.id });
                                    document.querySelectorAll('.player-spot').forEach(s => { s.classList.remove('targetable'); s.onclick = null; });
                                    document.getElementById('status-text').innerText = "ส่งผลโหวตแล้ว รอเวลาหมด...";
                                } else {
                                    if(actionType === 'GUARD_PROTECT') lastGuard = p.id;
                                    socket.emit('nightAction', { roomId: myRoom, targetId: p.id, actionType: actionType });
                                    document.querySelectorAll('.player-spot').forEach(s => { s.classList.remove('targetable'); s.onclick = null; });
                                    document.getElementById('status-text').innerText = "ส่งคำสั่งแล้ว รอคนอื่น...";
                                }
                            }
                        };
                    }
                }
            }
        });
    }

    socket.on('roomListUpdate', (rooms) => {
        const list = document.getElementById('room-list');
        list.innerHTML = rooms.length === 0 ? '<p style="color:#888;">ยังไม่มีใครสร้างห้อง</p>' : rooms.map(r => `<div class="room-card"><div><b>${r.id}</b> ${r.hasPassword?'🔒':''}<br><small>คนในห้อง: ${r.currentPlayers}/${r.maxPlayers}</small></div><button style="width:auto; padding:5px 15px;" class="btn-blue" onclick="joinRoomPrompt('${r.id}', ${r.hasPassword})">เข้า</button></div>`).join('');
    });

    socket.on('joined', (d) => { myRoom = d.roomId; isHost = d.isHost; showScreen('waiting-room'); document.getElementById('room-title').innerText = "ห้อง: " + myRoom; if(isHost) document.getElementById('host-controls').classList.remove('hidden'); });

    socket.on('updateRoom', (room) => {
        const pList = document.getElementById('player-list');
        if(pList) pList.innerHTML = room.players.map(p => `<div class="player-item"><span>${p.name} ${p.isHost?'👑':''}</span><span>${p.isReady?'✅ พร้อม':'⏳ รอ'}</span></div>`).join('');
        
        if(isHost && room.state === 'LOBBY') { const btn = document.getElementById('start-btn'); btn.disabled = room.players.length < 4; btn.innerText = room.players.length < 4 ? `ขาดอีก ${4-room.players.length} คน` : "เริ่มเกม"; }

        if (room.state !== currentGameState) {
            currentGameState = room.state;
            if (room.state === 'NIGHT_WOLF') speakGame("เข้าสู่กลางคืน มนุษย์หมาป่าลืมตา");
            else if (room.state === 'NIGHT_SEER') speakGame("มนุษย์หมาป่าหลับตา ผู้หยั่งรู้ลืมตา");
            else if (room.state === 'NIGHT_BODYGUARD') speakGame("ผู้หยั่งรู้หลับตา บอดี้การ์ดลืมตา");
            else if (room.state === 'DAY_TIME') speakGame("ทุกคนลืมตา เช้าแล้ว");
            else if (room.state === 'VOTING') speakGame("เริ่มทำการโหวตได้");
            else if (room.state === 'GAME_OVER') speakGame("เกมจบแล้ว " + room.winner);
        }

        if(room.state === 'STARTING') {
            lastGuard = '';
            showScreen('game-table-screen');
            document.getElementById('phase-title').innerText = "⏳ กำลังเริ่มเกม...";
            document.getElementById('status-text').innerHTML = "";
            document.getElementById('timer-text').classList.remove('hidden');
            document.getElementById('table-controls').classList.add('hidden');
            renderPlayersOnTable(room);
        }

        if(room.state === 'ROLE_REVEAL') {
            const me = room.players.find(p => p.id === socket.id);
            if(me) {
                myRole = me.role;
                showScreen('game-screen'); 
                document.getElementById('role-text').innerText = "คุณคือ: " + myRole;
                document.getElementById('role-img').style.backgroundImage = "url('" + ROLE_IMG[myRole] + "')";
                document.getElementById('ready-btn').disabled = false;
                document.getElementById('ready-btn').innerText = "พร้อมเข้าสู่กลางคืน";
                generateTableSpots(room.maxPlayers.toString());
            }
        }

        if(room.state === 'NIGHT_TRANSITION') {
            showScreen('game-table-screen');
            document.getElementById('phase-title').innerText = "🌙 เตรียมเข้าสู่กลางคืน...";
            document.getElementById('status-text').innerHTML = "";
            document.getElementById('timer-text').classList.remove('hidden');
            document.getElementById('table-controls').classList.add('hidden');
            renderPlayersOnTable(room);
        }

        if(room.state.includes('NIGHT_') && room.state !== 'NIGHT_TRANSITION') {
            showScreen('game-table-screen');
            document.getElementById('phase-title').innerText = "🌙 กลางคืน";
            const statusText = document.getElementById('status-text');
            document.getElementById('timer-text').classList.add('hidden');
            document.getElementById('table-controls').classList.add('hidden');

            const me = room.players.find(p => p.id === socket.id);
            if(!me.isAlive) { statusText.innerText = "คุณตายแล้ว เฝ้าดูวิญญาณ..."; }
            else if(room.state === 'NIGHT_WOLF' && myRole === 'มนุษย์หมาป่า') { statusText.innerText = "หมาป่า! กดเลือกเป้าหมายที่รูปผู้เล่น!"; }
            else if(room.state === 'NIGHT_SEER' && myRole === 'ผู้หยั่งรู้') { statusText.innerText = "ผู้หยั่งรู้! กดเลือกเป้าหมายที่รูปผู้เล่น!"; }
            else if(room.state === 'NIGHT_BODYGUARD' && myRole === 'บอดี้การ์ด') { statusText.innerText = "บอดี้การ์ด! กดเลือกปกป้องที่รูปผู้เล่น!"; }
            else { statusText.innerText = "🌙 นอนหลับ... รอคนอื่นดำเนินการ"; }
            
            renderPlayersOnTable(room);
        }

        if(room.state === 'DAY_TIME') {
            showScreen('game-table-screen');
            document.getElementById('phase-title').innerText = "☀️ เช้าวันใหม่";
            const statusText = document.getElementById('status-text');
            const me = room.players.find(p => p.id === socket.id);
            
            let status = room.lastVictim ? `<p style="color:#e74c3c; font-size:16px;">เมื่อคืน <b>${room.lastVictim}</b> ถูกฆ่าตาย</p>` : "<p style='font-size:16px;'>ไม่มีใครตาย</p>";
            if(me && me.isAlive) status += "<br><p style='font-size:13px; color:#aaa;'>เมื่อคุยจบ กดปุ่มด้านล่างเพื่อเริ่มโหวต</p>"; 
            else status += "<br><p style='color:#aaa'>คุณตายแล้ว รอเพื่อนโหวต...</p>"; 
            statusText.innerHTML = status;
            
            renderPlayersOnTable(room);
            
            const controls = document.getElementById('table-controls');
            if(me && me.isAlive) {
                controls.classList.remove('hidden');
                controls.innerHTML = `<button onclick="socket.emit('startVoting', myRoom)">เริ่มทำการโหวต</button>`;
            } else { controls.classList.add('hidden'); }
        }

        if(room.state === 'PRE_VOTING') {
            showScreen('game-table-screen');
            document.getElementById('phase-title').innerText = "⚖️ เตรียมตัวโหวตใน...";
            document.getElementById('status-text').innerHTML = "";
            document.getElementById('timer-text').classList.remove('hidden');
            document.getElementById('table-controls').classList.add('hidden');
            renderPlayersOnTable(room);
        }

        if(room.state === 'VOTING') {
            showScreen('game-table-screen');
            document.getElementById('phase-title').innerText = "⚖️ ช่วงโหวต!";
            const statusText = document.getElementById('status-text');
            const timerText = document.getElementById('timer-text');
            const me = room.players.find(p => p.id === socket.id);
            totalAlive = room.players.filter(p => p.isAlive).length;
            
            statusText.innerHTML = `<p>กดที่กล่องผู้เล่นเพื่อโหวต<br>(โหวตแล้ว 0 / ${totalAlive} คน)</p>`;
            timerText.classList.remove('hidden'); 
            
            renderPlayersOnTable(room);

            const controls = document.getElementById('table-controls');
            if(me && me.isAlive) {
                controls.classList.remove('hidden');
                controls.innerHTML = `<button style="background:#555;" onclick="if(confirm('คุณต้องการจะข้ามการโหวตใช่หรือไม่?')){socket.emit('castVote', { roomId: myRoom, targetId: 'SKIP' }); this.disabled=true; document.getElementById('status-text').innerText='ข้ามโหวตแล้ว รอเวลาหมด...'; document.querySelectorAll('.player-spot').forEach(s => { s.classList.remove('targetable'); s.onclick = null; });}">ข้ามการโหวต (Skip)</button>`;
            } else { controls.classList.add('hidden'); }
        }

        if(room.state === 'DAY_RESULT') {
            showScreen('game-table-screen');
            document.getElementById('phase-title').innerText = "⚖️ ผลโหวต";
            const statusText = document.getElementById('status-text');
            document.getElementById('timer-text').classList.add('hidden');
            document.getElementById('table-controls').classList.add('hidden');

            if (room.lastEliminated) statusText.innerHTML = `<p style="color:#e74c3c; font-size:18px; font-weight:bold;">มติเอกฉันท์:<br>${room.lastEliminated} ถูกโหวตออก!</p>`;
            else statusText.innerHTML = `<p style="font-size:16px; font-weight:bold;">คะแนนไม่เอกฉันท์<br>(รอดทุกคน)</p>`;
        }

        if(room.state === 'GAME_OVER') {
            document.getElementById('table-controls').classList.add('hidden');
            document.getElementById('end-screen').classList.remove('hidden');
            
            const title = document.getElementById('win-title');
            title.innerText = room.winner; title.style.color = room.winner.includes('หมาป่า') ? 'var(--wolf)' : 'var(--seer)';
            
            document.getElementById('end-roles').innerHTML = room.players.map(p => `<p style="margin:5px 0;"><b>${p.name}:</b> ${p.role} ${p.isAlive ? '' : '💀'} <span style="color:#2ecc71; font-size:12px;">${p.wantsToPlayAgain ? '✅ เล่นต่อ' : ''}</span></p>`).join('');

            const me = room.players.find(p => p.id === socket.id);
            const paBtn = document.getElementById('play-again-btn');
            if (me && me.wantsToPlayAgain) { paBtn.disabled = true; paBtn.innerText = "รอเพื่อนกดเล่นต่อ..."; } else { paBtn.disabled = false; paBtn.innerText = "เล่นต่อ (Play Again)"; }
        }
    });

    socket.on('voteCountUpdate', (count) => {
        const vc = document.getElementById('status-text');
        if(vc && currentGameState === 'VOTING') vc.innerHTML = `<p>กดที่กล่องผู้เล่นเพื่อโหวต<br>(โหวตแล้ว ${count} / ${totalAlive} คน)</p>`;
    });
    
    // --- โค้ดส่วนที่แก้บั๊กตัวเลขจับเวลาค้างบนหน้าจอ ---
    socket.on('timerUpdate', (time) => { 
        const timer = document.getElementById('timer-text'); 
        if(timer) {
            timer.innerText = time;
            // ซ่อนกล่องข้อความถ้า Server ส่งค่าว่างมา (เมื่อเวลาสิ้นสุด)
            if(time === '') {
                timer.classList.add('hidden');
            } else {
                timer.classList.remove('hidden');
            }
        } 
    });
    
    socket.on('seerResult', (d) => { alert(`ผลการตรวจ: ${d.name} คือ ${d.result} ${d.result === 'คนดี' ? '👍🏻' : '👎🏻'}`); });
    
    function playerReady() { socket.emit('playerReady', myRoom); document.getElementById('ready-btn').disabled = true; document.getElementById('ready-btn').innerText = "รอคนอื่นกดพร้อม..."; }
    function playAgain() { socket.emit('playAgain', myRoom); }
    function startGame() { socket.emit('startGame', myRoom); }
    socket.on('errorMsg', (m) => alert(m));
</script>
</body>
</html>
